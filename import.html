<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>央廚到貨驗證｜Kitchen OS v2.0</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>*{box-sizing:border-box}body{margin:0;background:#f3f4f1;color:#17211d;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}.wrap{max-width:1100px;margin:auto;padding:16px}.top{display:flex;gap:12px;align-items:center;margin-bottom:16px}.back{color:#285842;text-decoration:none;font-weight:800}.badge{background:#173b2f;color:white;border-radius:999px;padding:4px 9px;font-size:12px}.card{background:#fff;border:1px solid #dfe4df;border-radius:18px;padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.drop{border:2px dashed #9eb3a7;border-radius:16px;padding:28px;text-align:center;cursor:pointer;margin-top:12px}.btn{border:0;border-radius:12px;min-height:46px;padding:0 16px;font-weight:800;font-size:15px;cursor:pointer}.primary{background:#173b2f;color:#fff}.secondary{background:#e5e9e6}.danger{background:#9f2f2f;color:#fff}input,select{width:100%;height:44px;border:1px solid #cbd2ce;border-radius:9px;padding:0 9px;background:#fff}.status{padding:12px;border-radius:12px;background:#eef3ef;line-height:1.7;margin-top:12px}.bad{background:#fff0ed;color:#a32727}.good{background:#edf8f0;color:#176235}.warn{background:#fff8df;color:#735b12}.hidden{display:none}.scroll{max-height:58vh;overflow:auto;border:1px solid #e3e7e4;border-radius:12px}table{width:100%;border-collapse:collapse}th,td{padding:8px 6px;border-bottom:1px solid #e8ece9;font-size:13px;text-align:left}th{background:#eef3ef;position:sticky;top:0;z-index:1}.diff{background:#fff3f0}.num{text-align:right}.muted{color:#68736d;font-size:13px;line-height:1.6}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}@media(max-width:650px){.grid{grid-template-columns:1fr}.wrap{padding:12px}th,td{font-size:12px;padding:7px 4px}}</style></head>
<body><main class="wrap"><div class="top"><a class="back" href="index.html">‹ 首頁</a><h2>央廚到貨驗證</h2><span class="badge">v2.0 Beta</span></div>
<section class="card"><b>此版已依你的 6601 叫貨表格式重寫：</b><div class="muted">辨識第 1 列品項欄、第 2 列日期、第 3 列「到貨日」，不會把預估或盤點庫存誤當成應到。匯入前一定先預覽，確認後才存 Firebase。</div></section>
<section class="card"><div class="grid"><label>預計到貨日期<input id="deliveryDate" type="date"></label><label>收貨人（隔天收貨時填）<input id="receiver" placeholder="輸入姓名"></label></div><div id="drop" class="drop">📂 點這裡上傳 6601盤點叫貨表.xlsx<input id="file" type="file" accept=".xlsx,.xls" hidden></div><div id="loadStatus" class="status">尚未選擇檔案。</div><div id="selectors" class="grid hidden" style="margin-top:12px"><label>工作表<select id="sheetSelect"></select></label><label>到貨欄<select id="columnSelect"></select></label></div><div class="actions"><button class="btn secondary" onclick="scanSelectedSheet()">重新辨識</button><button class="btn primary" onclick="saveExpected()">確認預覽並儲存應到</button><button class="btn secondary" onclick="loadExpected(true)">載入此日已存應到</button></div></section>
<section id="previewCard" class="card hidden"><h3>匯入預覽</h3><div id="previewSummary" class="status"></div><div class="scroll"><table><thead><tr><th>Excel列</th><th>現場次序</th><th>央廚次序</th><th>品項</th><th>單位</th><th class="num">應到</th><th>狀態</th></tr></thead><tbody id="previewRows"></tbody></table></div></section>
<section id="verifyCard" class="card hidden"><h3>隔天實到驗證</h3><div id="verifySummary" class="status"></div><div class="scroll"><table><thead><tr><th>#</th><th>品項</th><th class="num">應到</th><th>實到</th><th>差異</th><th>原因</th></tr></thead><tbody id="verifyRows"></tbody></table></div><div class="actions"><button class="btn secondary" onclick="fillActual()">實到全部＝應到</button><button class="btn primary" onclick="saveVerified()">確認並同步今日實到</button></div></section>
</main><script>
const firebaseConfig={apiKey:"AIzaSyCFTPiF6H-mpu3-hiUFDZv0okkQxv9PH1g",authDomain:"kitchen-os-fad49.firebaseapp.com",projectId:"kitchen-os-fad49",storageBucket:"kitchen-os-fad49.firebasestorage.app",messagingSenderId:"663452568096",appId:"1:663452568096:web:8a9c5a8d96d8a205918a45",measurementId:"G-NQQW99MCWY"};
let db=null;try{firebase.initializeApp(firebaseConfig);db=firebase.firestore()}catch(e){console.warn(e)}
const $=id=>document.getElementById(id);let wb=null,fileName='',candidateCols=[],selectedRows=[],pending={};
function localDate(d){const x=new Date(d.getTime()-d.getTimezoneOffset()*60000);return x.toISOString().slice(0,10)}const t=new Date();t.setDate(t.getDate()+1);$('deliveryDate').value=localDate(t);
function numeric(v){if(typeof v==='number'&&Number.isFinite(v))return v;const s=String(v??'').trim().replace(/,/g,'');return /^[-+]?\d+(\.\d+)?$/.test(s)?Number(s):null}
function dateKey(v){if(v instanceof Date&&!isNaN(v))return localDate(v);if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);if(d)return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`}const s=String(v??'').trim();let m=s.match(/(20\d{2})[\/-](\d{1,2})[\/-](\d{1,2})/);if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;m=s.match(/^(\d{1,2})[\/-](\d{1,2})$/);if(m)return `${$('deliveryDate').value.slice(0,4)}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;return ''}
function colLetter(c){return XLSX.utils.encode_col(c)}
$('drop').onclick=()=>$('file').click();$('file').onchange=e=>e.target.files[0]&&readFile(e.target.files[0]);$('drop').ondragover=e=>e.preventDefault();$('drop').ondrop=e=>{e.preventDefault();e.dataTransfer.files[0]&&readFile(e.dataTransfer.files[0])};$('deliveryDate').onchange=()=>wb?scanSelectedSheet():loadExpected(false);$('sheetSelect').onchange=scanSelectedSheet;$('columnSelect').onchange=applyColumn;
async function readFile(f){if(typeof XLSX==='undefined'){setStatus('Excel 讀取元件未載入，請確認網路後重新整理。','bad');return}try{setStatus('正在讀取大型 Excel，請稍候…','warn');wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true,cellFormula:true,cellStyles:false});fileName=f.name;$('sheetSelect').innerHTML=wb.SheetNames.map(n=>`<option value="${encodeURIComponent(n)}">${n}</option>`).join('');const preferred=wb.SheetNames.find(n=>n.includes('721-727'))||wb.SheetNames.find(n=>n.includes('盤點範本'))||wb.SheetNames.at(-1);$('sheetSelect').value=encodeURIComponent(preferred);$('selectors').classList.remove('hidden');scanSelectedSheet()}catch(e){console.error(e);setStatus(`Excel 讀取失敗：${e.message||e}`,'bad')}}
function setStatus(msg,type=''){$('loadStatus').className='status '+type;$('loadStatus').innerHTML=msg}
function findHeaderColumns(a){let headerRow=-1,itemCol=-1,siteCol=-1,centralCol=-1,unitCol=-1;for(let r=0;r<Math.min(8,a.length);r++){for(let c=0;c<(a[r]||[]).length;c++){const s=String(a[r][c]??'').replace(/\s/g,'');if(s.includes('S&S央廚採購')||s==='品項'||s.includes('產品名稱')){headerRow=r;itemCol=c}if(s==='現場次序')siteCol=c;if(s==='央廚次序')centralCol=c;if(s==='單位')unitCol=c}}return {headerRow,itemCol,siteCol,centralCol,unitCol}}
function scanSelectedSheet(){if(!wb)return;const sn=decodeURIComponent($('sheetSelect').value),ws=wb.Sheets[sn],a=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});const h=findHeaderColumns(a);if(h.itemCol<0){setStatus(`工作表「${sn}」找不到「S&S 央廚採購／品項」欄。`,'bad');$('previewCard').classList.add('hidden');return}candidateCols=[];for(let r=0;r<Math.min(10,a.length);r++)for(let c=0;c<(a[r]||[]).length;c++){const title=String(a[r][c]??'').replace(/\s/g,'');if(title!=='到貨日'&&!title.includes('到貨日'))continue;let d='';for(let rr=Math.max(0,r-3);rr<r;rr++){d=dateKey(a[rr]?.[c]);if(d)break}candidateCols.push({col:c,headerRow:r,date:d})}
const wanted=$('deliveryDate').value;const matches=candidateCols.filter(x=>x.date===wanted);const list=matches.length?matches:candidateCols;$('columnSelect').innerHTML=list.map((x,i)=>`<option value="${candidateCols.indexOf(x)}">${x.date||'日期未辨識'}｜${colLetter(x.col)}欄（到貨日）</option>`).join('');if(!candidateCols.length){setStatus(`「${sn}」找不到第 3 列的「到貨日」欄。`,'bad');$('previewCard').classList.add('hidden');return}if(matches.length)$('columnSelect').value=String(candidateCols.indexOf(matches[0]));applyColumn()}
function applyColumn(){const sn=decodeURIComponent($('sheetSelect').value),ws=wb.Sheets[sn],a=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true}),h=findHeaderColumns(a),cand=candidateCols[Number($('columnSelect').value)||0];if(!cand)return;selectedRows=[];const start=Math.max(h.headerRow,cand.headerRow)+1;for(let r=start;r<a.length;r++){const name=String(a[r]?.[h.itemCol]??'').trim();if(!name)continue;const qty=numeric(a[r]?.[cand.col]);const site=h.siteCol>=0?numeric(a[r]?.[h.siteCol]):null,central=h.centralCol>=0?numeric(a[r]?.[h.centralCol]):null;const unit=(a[r]?.[cand.col+1]??a[r]?.[h.unitCol]??'').toString().trim();if(qty===null&&site===null&&central===null)continue;selectedRows.push({excelRow:r+1,name,qty,siteSeq:site,centralSeq:central,unit})}
pending={};for(const x of selectedRows)if(x.qty!==null&&Number(x.qty)>0)pending[x.name]=x.qty;renderPreview(sn,cand)}
function renderPreview(sn,c){const wanted=$('deliveryDate').value,wrong=c.date&&c.date!==wanted,valid=selectedRows.filter(x=>x.qty!==null&&Number(x.qty)>0),zero=selectedRows.filter(x=>Number(x.qty)===0),blank=selectedRows.filter(x=>x.qty===null);setStatus(`已讀取 <b>${fileName}</b><br>工作表：<b>${sn}</b>｜到貨欄：<b>${colLetter(c.col)}</b>｜表內日期：<b>${c.date||'未辨識'}</b>`+(wrong?`<br><b>⚠ 選擇日期 ${wanted} 與表內日期不同，請勿直接儲存。</b>`:''),wrong?'bad':'good');$('previewCard').classList.remove('hidden');$('previewSummary').className='status '+(wrong?'bad':'good');$('previewSummary').innerHTML=`讀到 ${valid.length} 筆今日有到貨品項；${zero.length} 筆應到 0（不需驗收）；${blank.length} 筆空白。只有應到大於 0 的品項會存入驗收清單。`;$('previewRows').innerHTML=selectedRows.map(x=>`<tr><td>${x.excelRow}</td><td>${x.siteSeq??''}</td><td>${x.centralSeq??''}</td><td>${x.name}</td><td>${x.unit}</td><td class="num">${x.qty??''}</td><td>${x.qty===null?'空白，不匯入':Number(x.qty)===0?'今日無到貨，不驗收':'✓'}</td></tr>`).join('')}
async function saveExpected(){if(!wb||!selectedRows.length)return alert('請先成功讀取 Excel 並確認預覽');const cand=candidateCols[Number($('columnSelect').value)||0],date=$('deliveryDate').value;if(cand.date&&cand.date!==date)return alert(`日期不一致：你選 ${date}，Excel 到貨欄是 ${cand.date}`);if(!Object.keys(pending).length)return alert('此到貨欄沒有可匯入的數量');const data={deliveryDate:date,expected:pending,sourceRows:selectedRows,sourceFilename:fileName,sourceSheet:decodeURIComponent($('sheetSelect').value),sourceColumn:colLetter(cand.col),verified:false,uploadedAt:new Date().toLocaleString('zh-TW')};localStorage.setItem(`kos-expected-${date}`,JSON.stringify(data));try{if(db)await db.collection('deliveries').doc(date).set(data,{merge:true});alert(`已儲存 ${date} 應到，共 ${Object.keys(pending).length} 項`);renderVerify(data)}catch(e){console.error(e);alert('雲端儲存失敗，已先存在此裝置');renderVerify(data)}}
async function loadExpected(show){const date=$('deliveryDate').value;let data=null;try{if(db){const s=await db.collection('deliveries').doc(date).get();if(s.exists)data=s.data()}}catch(e){}if(!data)try{data=JSON.parse(localStorage.getItem(`kos-expected-${date}`)||'null')}catch(e){}if(!data?.expected){if(show)alert(`${date} 尚未儲存應到`);return}pending=data.expected;selectedRows=data.sourceRows||Object.entries(pending).map(([name,qty],i)=>({name,qty,centralSeq:i+1}));renderVerify(data)}
function renderVerify(data){$('verifyCard').classList.remove('hidden');$('verifySummary').className='status good';$('verifySummary').innerHTML=`已載入 ${data.deliveryDate} 應到：${data.sourceSheet||''} ${data.sourceColumn||''}欄，共 ${Object.keys(data.expected).length} 項。`;const vals=data.values||{},issues=new Map((data.issues||[]).map(x=>[x.name,x]));$('verifyRows').innerHTML=selectedRows.filter(x=>data.expected[x.name]!==undefined).map((x,i)=>{const e=data.expected[x.name],a=vals[x.name]??'',reason=issues.get(x.name)?.reason||'';return `<tr data-name="${encodeURIComponent(x.name)}"><td>${x.centralSeq??x.siteSeq??i+1}</td><td>${x.name}</td><td class="expected num">${e}</td><td><input class="actual" type="number" step="0.01" value="${a}" oninput="checkRow(this)"></td><td class="delta">—</td><td><select class="reason" onchange="checkRow(this)"><option value="">無差異</option>${['央廚少出','央廚多出','現場漏收','單位不符','破損／退貨','其他'].map(r=>`<option ${r===reason?'selected':''}>${r}</option>`).join('')}</select></td></tr>`}).join('');document.querySelectorAll('.actual').forEach(checkRow)}
function checkRow(el){const tr=el.closest('tr'),e=Number(tr.querySelector('.expected').textContent),a=Number(tr.querySelector('.actual').value),has=tr.querySelector('.actual').value!=='';const d=Math.round((a-e)*1000)/1000;tr.querySelector('.delta').textContent=has?(d>0?`+${d}`:d):'—';tr.classList.toggle('diff',has&&d!==0);if(has&&d===0)tr.querySelector('.reason').value=''}
function fillActual(){document.querySelectorAll('#verifyRows tr').forEach(tr=>{tr.querySelector('.actual').value=tr.querySelector('.expected').textContent;checkRow(tr.querySelector('.actual'))})}
async function saveVerified(){const receiver=$('receiver').value.trim();if(!receiver)return alert('請填收貨人');const values={},issues=[];for(const tr of document.querySelectorAll('#verifyRows tr')){const name=decodeURIComponent(tr.dataset.name),e=Number(tr.querySelector('.expected').textContent),raw=tr.querySelector('.actual').value,reason=tr.querySelector('.reason').value;if(raw==='')return alert(`尚未填實到：${name}`);const a=Number(raw);if(a!==e&&!reason)return alert(`有差異但未選原因：${name}`);values[name]=a;if(a!==e)issues.push({name,expected:e,actual:a,difference:a-e,reason})}const date=$('deliveryDate').value;const base=JSON.parse(localStorage.getItem(`kos-expected-${date}`)||'{}');const data={...base,deliveryDate:date,expected:pending,values,issues,receiver,verified:true,verifiedAt:new Date().toLocaleString('zh-TW')};localStorage.setItem(`kos-expected-${date}`,JSON.stringify(data));localStorage.setItem('kos-import-central-current',JSON.stringify(data));try{if(db)await db.collection('deliveries').doc(date).set(data,{merge:true});alert(`完成到貨驗證；差異 ${issues.length} 筆`);$('verifySummary').innerHTML=`已完成 ${date} 到貨驗證；差異 ${issues.length} 筆。`}catch(e){console.error(e);alert('雲端同步失敗，已先存在此裝置')}}
loadExpected(false);
</script></body></html>
