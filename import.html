<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>*{box-sizing:border-box}body{margin:0;background:#f3f4f1;color:#17211d;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}.wrap{max-width:1040px;margin:auto;padding:16px}.top{display:flex;gap:12px;align-items:center;margin-bottom:16px}.back{color:#285842;text-decoration:none;font-weight:800}.card{background:#fff;border:1px solid #dfe4df;border-radius:18px;padding:16px;margin-bottom:14px}.drop{border:2px dashed #9eb3a7;border-radius:16px;padding:28px;text-align:center;cursor:pointer}.btn{border:0;border-radius:12px;min-height:46px;padding:0 16px;font-weight:800;font-size:15px;cursor:pointer}.primary{background:#173b2f;color:#fff}.secondary{background:#e5e9e6}.meta,.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;height:42px;border:1px solid #cbd2ce;border-radius:8px;padding:0 8px;background:#fff}table{width:100%;border-collapse:collapse}th,td{padding:8px 6px;border-bottom:1px solid #e8ece9;font-size:13px;text-align:left}th{background:#eef3ef;position:sticky;top:0;z-index:1}.diff{background:#fff3f0}.ok{color:#16703d;font-weight:800}.bad{color:#b82b2b;font-weight:800}.info{color:#285842;font-weight:800}.muted{color:#6a756f;font-size:13px;line-height:1.6}.hidden{display:none}.notice{background:#fff8df;border:1px solid #ead18b;padding:11px;border-radius:12px;font-size:13px;line-height:1.6;margin-bottom:12px}.source{background:#edf5f1;border:1px solid #c9ddd2;padding:12px;border-radius:12px;margin:12px 0;line-height:1.7;font-size:13px}.scroll{max-height:58vh;overflow:auto;border:1px solid #e3e7e4;border-radius:12px}.step{font-size:12px;color:#64706a;margin:4px 0 10px}@media(max-width:600px){.meta,.actions{grid-template-columns:1fr}th,td{font-size:12px;padding:7px 4px}.wrap{padding:12px}}</style></head><body><main class="wrap">
<div class="top"><a class="back" href="index.html">‹ 首頁</a><h2>央廚到貨驗證</h2></div>
<div class="notice"><b>今天下貨後：</b>上傳叫貨表，系統會依「預計到貨日」尋找表內同日期的<b>到貨日欄</b>，不再抓盤點庫存或其他數字。<br><b>隔天收貨：</b>載入該日應到，填寫實到並驗證差異。</div>
<section class="card"><div class="meta"><label>預計／實際到貨日期<input id="deliveryDate" type="date"></label><label>收貨人（到貨當天填）<input id="receiver" placeholder="輸入姓名"></label></div><div class="step">預設明天。今天要直接驗證，也可以改成今天。</div><div id="drop" class="drop">📂 上傳今天下完貨的 6601 盤點叫貨表<input id="file" type="file" accept=".xlsx,.xls" hidden></div>
<div id="sourceBox" class="source hidden"><label>系統找到的到貨欄<select id="sourceSelect"></select></label><div id="sourceInfo" class="muted"></div></div>
<div class="actions" style="margin-top:12px"><button class="btn secondary" onclick="saveExpected()">儲存應到（隔日驗證）</button><button class="btn secondary" onclick="loadExpected(true)">重新載入此日應到</button></div></section>
<section id="result" class="card hidden"><div id="status"></div><div class="scroll"><table><thead><tr><th>#</th><th>品項</th><th>應到</th><th>實到</th><th>差異</th><th>原因</th></tr></thead><tbody id="rows"></tbody></table></div><div class="actions" style="margin-top:12px"><button class="btn secondary" onclick="fillActual()">實到全部＝應到</button><button class="btn primary" onclick="saveVerified()">確認並同步今日實到</button></div></section>
</main><script>
const firebaseConfig={apiKey:"AIzaSyCFTPiF6H-mpu3-hiUFDZv0okkQxv9PH1g",authDomain:"kitchen-os-fad49.firebaseapp.com",projectId:"kitchen-os-fad49",storageBucket:"kitchen-os-fad49.firebasestorage.app",messagingSenderId:"663452568096",appId:"1:663452568096:web:8a9c5a8d96d8a205918a45",measurementId:"G-NQQW99MCWY"};firebase.initializeApp(firebaseConfig);const db=firebase.firestore();
const targetNames=["舒肥章魚 KG","蒔蘿油 200G/BAG","雞肝慕斯 350G/BAG","焦化洋蔥泥-200G/BAG","酸種麵包切片 10片","草莓醬 200G/BAG","番茄沙拉醃汁-350G/BAG","巴西里油-300G/BAG","醃杏桃醋汁(羊排) 100G/BAG","柏迪耶海鹽奶油 8顆/包","費塔乾酪 220G/包","TYSON黃玉米餅2.12K/BAG","墨西哥沙拉醬-800G/BAG","泰式沙拉醬-800G/包","醃紫高麗-800G/BAG","黑橄欖醬-200G/BAG","紅酒醋凍-450G/BAG","章魚美乃滋-600G/BAG","鹽漬檸檬 4EA/BAG","起司蛋糕 8份/1模最低叫貨2模","巧克力蛋糕 1模","艾樂薇35%動物鮮奶油 1L","巧克力粉 100G/BAG","巧克力脆片 50G/BAG","葡萄糖漿 300G/BAG","胡桃派 8份/1模","Familia瑞士全家葡萄綜合果物 500g","玉米罐頭340g 12罐/組","冷凍Pizza麵團275G 6EA/BAG","綜合起司包10份/包","佛特樂起司2.5KG/包","乾醃熟燻畢可培根","烤馬鈴薯片 1KG/BAG","畢可客製義式絞肉/公斤","原味瑞可塔起司 1000G/BAG","農夫派底醬 1800G/BAG","香菇派底醬-1100G/BAG","帶殼溫泉蛋/10粒/盒","辣蜂蜜-250G/BAG","西班牙初榨橄欖油 3L/瓶","黑松露油250ml/BOT","玉米餃8pc 10BAG/PACK","寬帶麵120G 10BAG/PACK","細扁麵120G 10BAG/PACK","細麵120G 10BAG/PACK","墨魚細麵120G 10BAG/PACK","麵疙瘩120G 10BAG/PACK","彎管通心粉110G 10BAG/PACK","波隆那肉醬2KG*6包/箱","羅勒油-150G/BAG","油封蒜碎-1000G/BAG","油封蔬菜-500G/BAG","蛤蠣醬-850G/BAG","墨魚肉醬-1.2KG/BAG","墨魚絲640G/BAG","燉羊肉醬 1800G/BAG","山羊起司醬 100G/BAG","伏特加辣番茄醬 850G/BAG","紅蝦高湯 1.6KG/BAG","巴西里青醬 250G/BAG","帕馬森起司高湯 1KG/BAG","牛油 500G/BAG","帕達諾起司粉 1000G/BAG","塔雷吉歐起司奶蓋 600G/BAG","番茄調味汁 600G/BAG","白酒甘蔥碎 200G/BAG","醃紅辣椒片 125G/BAG","油封蕃茄-500G/BAG","檸檬瑞可塔起司-400G/BAG","香蒜麵包碎-200G/BAG","乾辣椒碎 200G/BAG","修清肋眼-(PRI/切片/公斤)","舒肥牛小排 KG","舒肥牛肋條 KG","舒肥雞腿 KG","白洋蔥底醬 125G/BAG","法國麵包粉(額外提需求)","瑪莉娜拉蕃茄醬-1KG/BAG","鹽水半雞 3隻/BAG","黑蒜醬 300G/BAG","預拌薯泥-450G/BAG","紫高麗菜泥 250G/BAG","褐色雞湯 200G/BAG","香料雞汁-200G/BAG","香料油-300G/BAG","鯷魚奶油 300G/EA","A-PEN麵包粉-500G/BAG","香料麵包粉(牛小排) 200G/BAG","成型漢堡 (10cm/200g/顆)","漢堡麵包 6EA/BAG","紅椒辣起司醬 500G/BAG","舒肥羊排 500G/BAG","羊排紅椒醬-300G/BAG","醃黃瓜片-300G/BAG","醃黃瓜條 10EA/BAG","玉米糖膠液 1KG/包","Verstegen粉紅胡椒粒140g","Costco萬用強吸力紙抹布55張","辣油 300G/BAG","鳳梨果乾 40g/10片/BAG","科克蘭100%楓糖漿1公升/瓶","醃番茄沙拉-1770G/BAG","羽衣甘藍/KG"];
const norm=s=>String(s??'').toLowerCase().replace(/[\s　]/g,'').replace(/[－–—_]/g,'-').replace(/[（）]/g,m=>m==='（'?'(':')').replace(/公斤/g,'kg').replace(/公克/g,'g').replace(/[.。]/g,'');
const targetMap=new Map(targetNames.map(n=>[norm(n),n]));
let pending={},loadedData=null,currentFilename='',workbook=null,candidates=[],selectedRows=[];
const $=id=>document.getElementById(id);const deliveryDate=$('deliveryDate'),receiver=$('receiver'),drop=$('drop'),file=$('file'),sourceBox=$('sourceBox'),sourceSelect=$('sourceSelect'),sourceInfo=$('sourceInfo'),result=$('result'),status=$('status'),rows=$('rows');
const localDate=d=>{const x=new Date(d.getTime()-d.getTimezoneOffset()*60000);return x.toISOString().slice(0,10)};const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);deliveryDate.value=localDate(tomorrow);
drop.onclick=()=>file.click();file.onchange=e=>e.target.files[0]&&readFile(e.target.files[0]);drop.ondragover=e=>e.preventDefault();drop.ondrop=e=>{e.preventDefault();e.dataTransfer.files[0]&&readFile(e.dataTransfer.files[0])};deliveryDate.addEventListener('change',()=>{if(workbook)scanWorkbook();else loadExpected(false)});sourceSelect.addEventListener('change',applyCandidate);
function numeric(v){if(typeof v==='number'&&isFinite(v))return v;const t=String(v??'').trim().replace(/,/g,'');return /^[-+]?\d+(\.\d+)?$/.test(t)?Number(t):null}
function excelDate(v){if(v instanceof Date&&!isNaN(v))return localDate(v);if(typeof v==='number'){const p=XLSX.SSF.parse_date_code(v);if(p)return `${p.y}-${String(p.m).padStart(2,'0')}-${String(p.d).padStart(2,'0')}`}const s=String(v??'').trim();const m=s.match(/(20\d{2})[\/-](\d{1,2})[\/-](\d{1,2})/);if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;const md=s.match(/^(\d{1,2})[\/-](\d{1,2})$/);if(md){const y=Number(deliveryDate.value.slice(0,4));return `${y}-${md[1].padStart(2,'0')}-${md[2].padStart(2,'0')}`}return null}
function colLetter(n){let s='';for(n++;n;n=Math.floor((n-1)/26))s=String.fromCharCode(65+(n-1)%26)+s;return s}
async function readFile(f){try{workbook=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true,cellFormula:true});currentFilename=f.name;scanWorkbook()}catch(e){console.error(e);alert('Excel 讀取失敗，請確認檔案格式')}}
function scanWorkbook(){const wanted=deliveryDate.value;candidates=[];for(const sn of workbook.SheetNames){const a=XLSX.utils.sheet_to_json(workbook.Sheets[sn],{header:1,defval:null,raw:true});if(!a.length)continue;let itemCol=3,itemHeaderRow=0;for(let r=0;r<Math.min(8,a.length);r++)for(let c=0;c<(a[r]||[]).length;c++){const t=String(a[r][c]??'');if(t.includes('央廚採購')||t==='品項'||t.includes('產品名稱')){itemCol=c;itemHeaderRow=r}}
for(let r=0;r<Math.min(8,a.length);r++)for(let c=0;c<(a[r]||[]).length;c++){if(!String(a[r][c]??'').includes('到貨日'))continue;let d=null;for(let rr=Math.max(0,r-2);rr<=Math.min(a.length-1,r+1);rr++){d=excelDate(a[rr]?.[c]);if(d)break}if(d!==wanted)continue;const data=[];for(let rr=Math.max(itemHeaderRow,r)+1;rr<a.length;rr++){const rawName=a[rr]?.[itemCol];if(rawName===null||rawName===undefined||String(rawName).trim()==='')continue;const q=numeric(a[rr]?.[c]);if(q===null)continue;const raw=String(rawName).trim();const canonical=targetMap.get(norm(raw))||raw;data.push({name:canonical,rawName:raw,qty:q,row:rr+1,siteSeq:numeric(a[rr]?.[0]),centralSeq:numeric(a[rr]?.[1]),productCode:String(a[rr]?.[2]??'')})}candidates.push({sheet:sn,col:c,row:r,date:d,itemCol,data})}}
sourceSelect.innerHTML='';if(!candidates.length){pending={};selectedRows=[];sourceBox.classList.remove('hidden');sourceInfo.innerHTML=`<span class="bad">找不到 ${wanted} 的「到貨日」欄。</span><br>請確認：①上傳正確週表；②日期選對；③Excel 中該日期上方有「到貨日」。`;result.classList.add('hidden');return}
candidates.forEach((x,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${x.sheet}｜${x.date}｜${colLetter(x.col)}欄｜${x.data.length}項`;sourceSelect.appendChild(o)});sourceBox.classList.remove('hidden');applyCandidate()}
function applyCandidate(){const x=candidates[Number(sourceSelect.value)||0];if(!x)return;pending={};selectedRows=x.data;for(const r of x.data)pending[r.name]=r.qty;renderRows();result.classList.remove('hidden');sourceInfo.innerHTML=`已鎖定工作表 <b>${x.sheet}</b>、<b>${colLetter(x.col)}欄</b>，欄位日期 ${x.date}。<br>辨識 ${x.data.length} 筆；系統只讀這個「到貨日」欄，不會讀盤點庫存。`;status.innerHTML=`<p class="ok">已辨識 ${Object.keys(pending).length} 個品項｜${currentFilename}</p><p class="info">確認數字後，按「儲存應到（隔日驗證）」。</p>`}
function renderRows(values={},issues=[]){const issueMap=new Map((issues||[]).map(x=>[x.name,x]));const ordered=selectedRows.length?selectedRows:Object.entries(pending).map(([name,qty],i)=>({name,qty,row:i+1}));rows.innerHTML=ordered.map((r,i)=>{const n=r.name,e=pending[n];if(e===undefined)return'';const actual=values[n]??'',it=issueMap.get(n),reason=it?.reason||'';return `<tr data-name="${encodeURIComponent(n)}"><td>${r.centralSeq??r.siteSeq??i+1}</td><td>${n}</td><td class="expected">${e}</td><td><input class="actual" type="number" step="0.01" value="${actual}" oninput="checkRow(this)"></td><td class="delta">—</td><td><select class="reason" onchange="checkRow(this)"><option value="">無差異</option>${['央廚少出','央廚多出','現場漏收','單位不符','破損／退貨','其他'].map(x=>`<option ${x===reason?'selected':''}>${x}</option>`).join('')}</select></td></tr>`}).join('');document.querySelectorAll('tbody tr .actual').forEach(checkRow)}
function checkRow(el){const tr=el.closest('tr'),e=Number(tr.querySelector('.expected').textContent),raw=tr.querySelector('.actual').value,a=raw===''?NaN:Number(raw),d=Math.round((a-e)*1000)/1000;tr.querySelector('.delta').textContent=Number.isFinite(a)?(d>0?`+${d}`:d):'—';tr.classList.toggle('diff',Number.isFinite(a)&&d!==0);if(d===0)tr.querySelector('.reason').value=''}
function fillActual(){document.querySelectorAll('tbody tr').forEach(tr=>{tr.querySelector('.actual').value=tr.querySelector('.expected').textContent;checkRow(tr.querySelector('.actual'))})}
async function saveExpected(){const date=deliveryDate.value;if(!date)return alert('請選擇預計到貨日期');if(!Object.keys(pending).length)return alert('請先上傳叫貨 Excel，並確認系統找到正確到貨欄');const x=candidates[Number(sourceSelect.value)||0];const data={deliveryDate:date,expected:pending,verified:false,sourceFilename:currentFilename,sourceSheet:x?.sheet||'',sourceColumn:x?colLetter(x.col):'',sourceRows:selectedRows,uploadedAt:new Date().toLocaleString('zh-TW')};localStorage.setItem(`kos-expected-${date}`,JSON.stringify(data));try{await db.collection('deliveries').doc(date).set(data,{merge:true});status.innerHTML=`<p class="ok">已儲存 ${date} 應到資料，共 ${Object.keys(pending).length} 項。隔天選擇此日期即可驗證實到。</p>`;alert(`已儲存 ${date} 應到資料`)}catch(e){console.error(e);status.innerHTML='<p class="bad">雲端儲存失敗，已先保存在本機。</p>';alert('雲端儲存失敗，已先保存在本機')}}
async function loadExpected(showAlert=false){const date=deliveryDate.value;if(!date)return;let data=null;try{const snap=await db.collection('deliveries').doc(date).get();if(snap.exists)data=snap.data()}catch(e){console.warn(e)}if(!data){try{data=JSON.parse(localStorage.getItem(`kos-expected-${date}`)||'null')}catch(e){}}if(!data?.expected){pending={};loadedData=null;if(!workbook)result.classList.add('hidden');if(showAlert)alert(`${date} 尚未儲存應到資料`);return}pending=data.expected;loadedData=data;currentFilename=data.sourceFilename||'';selectedRows=data.sourceRows||Object.entries(pending).map(([name,qty],i)=>({name,qty,row:i+1}));renderRows(data.values||{},data.issues||[]);result.classList.remove('hidden');sourceBox.classList.remove('hidden');sourceInfo.innerHTML=`已載入雲端應到：${data.sourceSheet||'未記錄工作表'} ${data.sourceColumn?`／${data.sourceColumn}欄`:''}。`;status.innerHTML=`<p class="ok">已載入 ${date} 應到資料，共 ${Object.keys(pending).length} 項。${data.verified?'此日已完成驗證，可再次修正後儲存。':'請填寫實到數量。'}</p>`}
async function saveVerified(){if(!receiver.value.trim())return alert('請填收貨人');if(!Object.keys(pending).length)return alert('尚未載入應到資料');const values={},issues=[];for(const tr of document.querySelectorAll('tbody tr')){const n=decodeURIComponent(tr.dataset.name),e=Number(tr.querySelector('.expected').textContent),raw=tr.querySelector('.actual').value,a=raw===''?NaN:Number(raw),reason=tr.querySelector('.reason').value;if(!Number.isFinite(a))return alert(`尚未填實到：${n}`);if(a!==e&&!reason)return alert(`到貨有差異，請選原因：${n}`);values[n]=a;if(a!==e)issues.push({name:n,expected:e,actual:a,difference:a-e,reason})}const data={deliveryDate:deliveryDate.value,receiver:receiver.value.trim(),values,expected:pending,issues,verified:true,sourceFilename:currentFilename||loadedData?.sourceFilename||'',sourceSheet:loadedData?.sourceSheet||candidates[Number(sourceSelect.value)||0]?.sheet||'',sourceColumn:loadedData?.sourceColumn||(candidates[Number(sourceSelect.value)||0]?colLetter(candidates[Number(sourceSelect.value)||0].col):''),sourceRows:selectedRows,uploadedAt:loadedData?.uploadedAt||new Date().toLocaleString('zh-TW'),verifiedAt:new Date().toLocaleString('zh-TW'),updatedAt:new Date().toLocaleString('zh-TW')};localStorage.setItem('kos-import-central-current',JSON.stringify(data));localStorage.setItem(`kos-expected-${deliveryDate.value}`,JSON.stringify(data));try{await db.collection('deliveries').doc(deliveryDate.value).set(data,{merge:true});status.innerHTML=`<p class="ok">已完成 ${deliveryDate.value} 到貨驗證；差異 ${issues.length} 筆。</p>`;alert(`已同步今日實到；差異 ${issues.length} 筆`)}catch(e){console.error(e);alert('雲端同步失敗，已先保存在本機')}}
loadExpected(false);
</script></body></html>
