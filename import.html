<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>更新今日資料｜Kitchen OS</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>*{box-sizing:border-box}body{margin:0;background:#f3f4f1;color:#17211d;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}.wrap{max-width:760px;margin:auto;padding:16px}.top{display:flex;align-items:center;gap:12px;margin-bottom:16px}.back{color:#285842;text-decoration:none;font-weight:800}.top h1{margin:0;font-size:22px}.card{background:#fff;border:1px solid #dfe4df;border-radius:18px;padding:18px;margin-bottom:14px}.drop{border:2px dashed #9eb3a7;border-radius:16px;padding:34px 16px;text-align:center;background:#f8fbf9;cursor:pointer}.drop.drag{background:#edf6f1;border-color:#285842}.drop b{display:block;font-size:18px;margin:8px}.drop small{color:#69746e}.btn{border:0;border-radius:12px;height:48px;padding:0 18px;font-size:16px;font-weight:800;cursor:pointer}.primary{background:#173b2f;color:#fff}.secondary{background:#e5e9e6;color:#35423b}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.status{line-height:1.7}.ok{color:#16703d;font-weight:800}.warn{color:#ad6200;font-weight:800}.bad{color:#b82b2b;font-weight:800}.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px}.meta label{font-size:12px;color:#69736e}.meta input{width:100%;height:42px;margin-top:5px;border:1px solid #cbd2ce;border-radius:9px;padding:0 10px;font-size:16px}.preview{width:100%;border-collapse:collapse;margin-top:12px}.preview th,.preview td{padding:8px;border-bottom:1px solid #edf0ee;text-align:left;font-size:13px}.preview th:last-child,.preview td:last-child{text-align:right}.hidden{display:none}.notice{background:#fff8df;border:1px solid #ead18b;padding:11px 13px;border-radius:12px;font-size:12px;line-height:1.55;margin-bottom:12px}@media(max-width:560px){.meta,.actions{grid-template-columns:1fr}}</style></head><body><main class="wrap">
<div class="top"><a class="back" href="index.html">‹ 首頁</a><h1>更新今日到貨資料</h1></div>
<div class="notice">請從 Google 試算表下載「Microsoft Excel（.xlsx）」後上傳。檔案只在你的裝置瀏覽器中讀取，不會上傳到外部伺服器。</div>
<section class="card"><div id="drop" class="drop"><div style="font-size:34px">📂</div><b>拖曳 Excel 到這裡</b><small>或點擊選擇 .xlsx／.xls 檔案</small><input id="file" type="file" accept=".xlsx,.xls" hidden></div></section>
<section id="result" class="card hidden"><div class="meta"><label>今日到貨日期<input id="deliveryDate" type="date"></label><label>前一日盤點日期<input id="previousDate" type="date"></label></div><div id="status" class="status" style="margin-top:14px"></div><div id="preview"></div><div class="actions"><button class="btn secondary" onclick="resetImport()">重新選擇</button><button id="saveBtn" class="btn primary" onclick="saveImport()" disabled>套用到每日盤點</button></div></section>
<section id="current" class="card hidden"><b>目前網站資料</b><div id="currentInfo" class="status" style="margin-top:8px"></div><div class="actions"><a class="btn primary" style="display:flex;align-items:center;justify-content:center;text-decoration:none" href="daily.html">開始每日盤點</a><button class="btn secondary" onclick="clearImport()">清除匯入資料</button></div></section>
</main><script>
const targetNames=["舒肥章魚 KG","蒔蘿油 200G/BAG","雞肝慕斯 350G/BAG","焦化洋蔥泥-200G/BAG","酸種麵包切片 10片","草莓醬 200G/BAG","番茄沙拉醃汁-350G/BAG","巴西里油-300G/BAG","醃杏桃醋汁(羊排) 100G/BAG","柏迪耶海鹽奶油 8顆/包","費塔乾酪 220G/包","TYSON黃玉米餅2.12K/BAG","墨西哥沙拉醬-800G/BAG","泰式沙拉醬-800G/包","醃紫高麗-800G/BAG","黑橄欖醬-200G/BAG","紅酒醋凍-450G/BAG","章魚美乃滋-600G/BAG","鹽漬檸檬 4EA/BAG","起司蛋糕 8份/1模最低叫貨2模","巧克力蛋糕 1模","艾樂薇35%動物鮮奶油 1L","巧克力粉 100G/BAG","巧克力脆片 50G/BAG","葡萄糖漿 300G/BAG","胡桃派 8份/1模","Familia瑞士全家葡萄綜合果物 500g","玉米罐頭340g 12罐/組","冷凍Pizza麵團275G 6EA/BAG","綜合起司包10份/包","佛特樂起司2.5KG/包","乾醃熟燻畢可培根","烤馬鈴薯片 1KG/BAG","畢可客製義式絞肉/公斤","原味瑞可塔起司 1000G/BAG","農夫派底醬 1800G/BAG","香菇派底醬-1100G/BAG","帶殼溫泉蛋/10粒/盒","辣蜂蜜-250G/BAG","西班牙初榨橄欖油 3L/瓶","黑松露油250ml/BOT","玉米餃8pc 10BAG/PACK","寬帶麵120G 10BAG/PACK","細扁麵120G 10BAG/PACK","細麵120G 10BAG/PACK","墨魚細麵120G 10BAG/PACK","麵疙瘩120G 10BAG/PACK","彎管通心粉110G 10BAG/PACK","波隆那肉醬2KG*6包/箱","羅勒油-150G/BAG","油封蒜碎-1000G/BAG","油封蔬菜-500G/BAG","蛤蠣醬-850G/BAG","墨魚肉醬-1.2KG/BAG","墨魚絲640G/BAG","燉羊肉醬 1800G/BAG","山羊起司醬 100G/BAG","伏特加辣番茄醬 850G/BAG","紅蝦高湯 1.6KG/BAG","巴西里青醬 250G/BAG","帕馬森起司高湯 1KG/BAG","牛油 500G/BAG","帕達諾起司粉 1000G/BAG","塔雷吉歐起司奶蓋 600G/BAG","番茄調味汁 600G/BAG","白酒甘蔥碎 200G/BAG","醃紅辣椒片 125G/BAG","油封蕃茄-500G/BAG","檸檬瑞可塔起司-400G/BAG","香蒜麵包碎-200G/BAG","乾辣椒碎 200G/BAG","修清肋眼-(PRI/切片/公斤)","舒肥牛小排 KG","舒肥牛肋條 KG","舒肥雞腿 KG","白洋蔥底醬 125G/BAG","法國麵包粉(額外提需求)","瑪莉娜拉蕃茄醬-1KG/BAG","鹽水半雞 3隻/BAG","黑蒜醬 300G/BAG","預拌薯泥-450G/BAG","紫高麗菜泥 250G/BAG","褐色雞湯 200G/BAG","香料雞汁-200G/BAG","香料油-300G/BAG","鯷魚奶油 300G/EA","A-PEN麵包粉-500G/BAG","香料麵包粉(牛小排) 200G/BAG","成型漢堡 (10cm/200g/顆)","漢堡麵包 6EA/BAG","紅椒辣起司醬 500G/BAG","舒肥羊排 500G/BAG","羊排紅椒醬-300G/BAG","醃黃瓜片-300G/BAG","醃黃瓜條 10EA/BAG","玉米糖膠液 1KG/包","Verstegen粉紅胡椒粒140g","Costco萬用強吸力紙抹布55張","辣油 300G/BAG","鳳梨果乾 40g/10片/BAG","科克蘭100%楓糖漿1公升/瓶","醃番茄沙拉-1770G/BAG","羽衣甘藍/KG"];
const norm=s=>String(s??'').toLowerCase().replace(/[\s　]/g,'').replace(/[－–—_]/g,'-').replace(/[（）]/g,m=>m==='（'?'(':')').replace(/公斤/g,'kg').replace(/公克/g,'g');
const targetMap=new Map(targetNames.map(n=>[norm(n),n]));let pending=null;
const today=new Date(),yday=new Date(Date.now()-86400000);deliveryDate.value=today.toISOString().slice(0,10);previousDate.value=yday.toISOString().slice(0,10);
const drop=document.getElementById('drop'),file=document.getElementById('file');drop.onclick=()=>file.click();file.onchange=e=>e.target.files[0]&&readFile(e.target.files[0]);['dragenter','dragover'].forEach(x=>drop.addEventListener(x,e=>{e.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(x=>drop.addEventListener(x,e=>{e.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>e.dataTransfer.files[0]&&readFile(e.dataTransfer.files[0]));
function numeric(v){if(typeof v==='number'&&Number.isFinite(v))return v;if(typeof v==='string'){const t=v.trim().replace(/,/g,'');if(/^[-+]?\d+(\.\d+)?$/.test(t))return Number(t)}return null}
function findDeliveryColumn(rows,itemRows){const scores={};for(const ri of itemRows){for(let r=Math.max(0,ri-12);r<ri;r++){(rows[r]||[]).forEach((v,c)=>{const t=String(v??'');if(/到貨|進貨|配送/.test(t))scores[c]=(scores[c]||0)+10;if(/\d{1,2}[\/\-]\d{1,2}/.test(t))scores[c]=(scores[c]||0)+2})}}return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0]?.[0];}
async function readFile(f){if(typeof XLSX==='undefined'){alert('Excel 讀取元件載入失敗，請確認網路後重新整理。');return}const buf=await f.arrayBuffer(),wb=XLSX.read(buf,{type:'array',cellDates:true});let found={},details=[];for(const sn of wb.SheetNames){const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:null,raw:false});const matches=[];rows.forEach((row,ri)=>row.forEach((v,ci)=>{const key=norm(v);if(targetMap.has(key))matches.push({ri,ci,name:targetMap.get(key)})}));if(!matches.length)continue;const dcol=findDeliveryColumn(rows,matches.map(x=>x.ri));let count=0;for(const m of matches){let val=null;if(dcol!==undefined)val=numeric(rows[m.ri]?.[Number(dcol)]);if(val===null){for(let c=m.ci+1;c<(rows[m.ri]||[]).length;c++){const n=numeric(rows[m.ri][c]);if(n!==null){val=n;break}}}if(val!==null){found[m.name]=val;count++}}details.push(`${sn}：辨識 ${matches.length} 個品項，取得 ${count} 筆到貨`)}pending={fileName:f.name,values:found,sheets:wb.SheetNames,details};showResult()}
function showResult(){result.classList.remove('hidden');const count=Object.keys(pending.values).length;status.innerHTML=`<div class="${count>=80?'ok':count?'warn':'bad'}">${count?`已辨識 ${count}／103 個品項`:'沒有辨識到可用的到貨資料'}</div><div>檔案：${pending.fileName}</div><div>工作表：${pending.sheets.join('、')}</div>${pending.details.map(x=>`<div>${x}</div>`).join('')}${count<80?'<div class="warn">首次使用仍建議把這份 Excel 上傳給 K仔確認欄位，避免抓到錯誤數字。</div>':''}`;const rows=Object.entries(pending.values).slice(0,12);preview.innerHTML=rows.length?`<table class="preview"><thead><tr><th>辨識品項（前12筆）</th><th>到貨</th></tr></thead><tbody>${rows.map(([n,v])=>`<tr><td>${n}</td><td>${v}</td></tr>`).join('')}</tbody></table>`:'';saveBtn.disabled=count===0}
function saveImport(){const data={...pending,deliveryDate:deliveryDate.value,previousDate:previousDate.value,updatedAt:new Date().toLocaleString('zh-TW')};localStorage.setItem('kos-import-central-current',JSON.stringify(data));alert(`已更新 ${Object.keys(data.values).length} 個品項的今日到貨資料`);showCurrent()}
function resetImport(){pending=null;file.value='';result.classList.add('hidden')}
function clearImport(){if(confirm('確定清除目前匯入的到貨資料？')){localStorage.removeItem('kos-import-central-current');showCurrent()}}
function showCurrent(){const x=JSON.parse(localStorage.getItem('kos-import-central-current')||'null');if(!x){current.classList.add('hidden');return}current.classList.remove('hidden');currentInfo.innerHTML=`<div class="ok">✅ 已套用 ${Object.keys(x.values||{}).length} 個品項</div><div>到貨日期：${x.deliveryDate||'—'}</div><div>檔案：${x.fileName||'—'}</div><div>更新時間：${x.updatedAt||'—'}</div>`}showCurrent();
</script></body></html>
