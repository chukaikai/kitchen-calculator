<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>央廚到貨驗證｜Kitchen OS</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>*{box-sizing:border-box}body{margin:0;background:#f3f4f1;color:#17211d;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}.wrap{max-width:980px;margin:auto;padding:16px}.top{display:flex;gap:12px;align-items:center;margin-bottom:16px}.back{color:#285842;text-decoration:none;font-weight:800}.card{background:#fff;border:1px solid #dfe4df;border-radius:18px;padding:16px;margin-bottom:14px}.drop{border:2px dashed #9eb3a7;border-radius:16px;padding:28px;text-align:center;cursor:pointer}.btn{border:0;border-radius:12px;min-height:46px;padding:0 16px;font-weight:800;font-size:15px}.primary{background:#173b2f;color:#fff}.secondary{background:#e5e9e6}.meta,.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;height:40px;border:1px solid #cbd2ce;border-radius:8px;padding:0 8px}table{width:100%;border-collapse:collapse}th,td{padding:8px 6px;border-bottom:1px solid #e8ece9;font-size:13px;text-align:left}th{background:#eef3ef;position:sticky;top:0}.diff{background:#fff3f0}.ok{color:#16703d;font-weight:800}.bad{color:#b82b2b;font-weight:800}.hidden{display:none}.notice{background:#fff8df;border:1px solid #ead18b;padding:11px;border-radius:12px;font-size:13px;line-height:1.6;margin-bottom:12px}.scroll{max-height:58vh;overflow:auto;border:1px solid #e3e7e4;border-radius:12px}@media(max-width:600px){.meta,.actions{grid-template-columns:1fr}th,td{font-size:12px;padding:7px 4px}}</style></head><body><main class="wrap">
<div class="top"><a class="back" href="index.html">‹ 首頁</a><h2>央廚到貨驗證</h2></div><div class="notice">上傳叫貨 Excel 後，系統帶出「應到」。收貨人填寫「實到」，有差異必須選原因，確認後同步給所有盤點人員。</div>
<section class="card"><div class="meta"><label>到貨日期<input id="deliveryDate" type="date"></label><label>收貨人<input id="receiver" placeholder="輸入姓名"></label></div><div id="drop" class="drop" style="margin-top:12px">📂 點擊或拖曳 Excel<input id="file" type="file" accept=".xlsx,.xls" hidden></div></section>
<section id="result" class="card hidden"><div id="status"></div><div class="scroll"><table><thead><tr><th>#</th><th>品項</th><th>應到</th><th>實到</th><th>差異</th><th>原因</th></tr></thead><tbody id="rows"></tbody></table></div><div class="actions" style="margin-top:12px"><button class="btn secondary" onclick="fillActual()">實到全部＝應到</button><button class="btn primary" onclick="saveVerified()">確認並同步到貨</button></div></section>
</main><script>const firebaseConfig={apiKey:"AIzaSyCFTPiF6H-mpu3-hiUFDZv0okkQxv9PH1g",authDomain:"kitchen-os-fad49.firebaseapp.com",projectId:"kitchen-os-fad49",storageBucket:"kitchen-os-fad49.firebasestorage.app",messagingSenderId:"663452568096",appId:"1:663452568096:web:8a9c5a8d96d8a205918a45",measurementId:"G-NQQW99MCWY"};firebase.initializeApp(firebaseConfig);const db=firebase.firestore();
const targetNames=["舒肥章魚 KG","蒔蘿油 200G/BAG","雞肝慕斯 350G/BAG","焦化洋蔥泥-200G/BAG","酸種麵包切片 10片","草莓醬 200G/BAG","番茄沙拉醃汁-350G/BAG","巴西里油-300G/BAG","醃杏桃醋汁(羊排) 100G/BAG","柏迪耶海鹽奶油 8顆/包","費塔乾酪 220G/包","TYSON黃玉米餅2.12K/BAG","墨西哥沙拉醬-800G/BAG","泰式沙拉醬-800G/包","醃紫高麗-800G/BAG","黑橄欖醬-200G/BAG","紅酒醋凍-450G/BAG","章魚美乃滋-600G/BAG","鹽漬檸檬 4EA/BAG","起司蛋糕 8份/1模最低叫貨2模","巧克力蛋糕 1模","艾樂薇35%動物鮮奶油 1L","巧克力粉 100G/BAG","巧克力脆片 50G/BAG","葡萄糖漿 300G/BAG","胡桃派 8份/1模","Familia瑞士全家葡萄綜合果物 500g","玉米罐頭340g 12罐/組","冷凍Pizza麵團275G 6EA/BAG","綜合起司包10份/包","佛特樂起司2.5KG/包","乾醃熟燻畢可培根","烤馬鈴薯片 1KG/BAG","畢可客製義式絞肉/公斤","原味瑞可塔起司 1000G/BAG","農夫派底醬 1800G/BAG","香菇派底醬-1100G/BAG","帶殼溫泉蛋/10粒/盒","辣蜂蜜-250G/BAG","西班牙初榨橄欖油 3L/瓶","黑松露油250ml/BOT","玉米餃8pc 10BAG/PACK","寬帶麵120G 10BAG/PACK","細扁麵120G 10BAG/PACK","細麵120G 10BAG/PACK","墨魚細麵120G 10BAG/PACK","麵疙瘩120G 10BAG/PACK","彎管通心粉110G 10BAG/PACK","波隆那肉醬2KG*6包/箱","羅勒油-150G/BAG","油封蒜碎-1000G/BAG","油封蔬菜-500G/BAG","蛤蠣醬-850G/BAG","墨魚肉醬-1.2KG/BAG","墨魚絲640G/BAG","燉羊肉醬 1800G/BAG","山羊起司醬 100G/BAG","伏特加辣番茄醬 850G/BAG","紅蝦高湯 1.6KG/BAG","巴西里青醬 250G/BAG","帕馬森起司高湯 1KG/BAG","牛油 500G/BAG","帕達諾起司粉 1000G/BAG","塔雷吉歐起司奶蓋 600G/BAG","番茄調味汁 600G/BAG","白酒甘蔥碎 200G/BAG","醃紅辣椒片 125G/BAG","油封蕃茄-500G/BAG","檸檬瑞可塔起司-400G/BAG","香蒜麵包碎-200G/BAG","乾辣椒碎 200G/BAG","修清肋眼-(PRI/切片/公斤)","舒肥牛小排 KG","舒肥牛肋條 KG","舒肥雞腿 KG","白洋蔥底醬 125G/BAG","法國麵包粉(額外提需求)","瑪莉娜拉蕃茄醬-1KG/BAG","鹽水半雞 3隻/BAG","黑蒜醬 300G/BAG","預拌薯泥-450G/BAG","紫高麗菜泥 250G/BAG","褐色雞湯 200G/BAG","香料雞汁-200G/BAG","香料油-300G/BAG","鯷魚奶油 300G/EA","A-PEN麵包粉-500G/BAG","香料麵包粉(牛小排) 200G/BAG","成型漢堡 (10cm/200g/顆)","漢堡麵包 6EA/BAG","紅椒辣起司醬 500G/BAG","舒肥羊排 500G/BAG","羊排紅椒醬-300G/BAG","醃黃瓜片-300G/BAG","醃黃瓜條 10EA/BAG","玉米糖膠液 1KG/包","Verstegen粉紅胡椒粒140g","Costco萬用強吸力紙抹布55張","辣油 300G/BAG","鳳梨果乾 40g/10片/BAG","科克蘭100%楓糖漿1公升/瓶","醃番茄沙拉-1770G/BAG","羽衣甘藍/KG"];
const norm=s=>String(s??'').toLowerCase().replace(/[\s　]/g,'').replace(/[－–—_]/g,'-').replace(/[（）]/g,m=>m==='（'?'(':')').replace(/公斤/g,'kg').replace(/公克/g,'g');const targetMap=new Map(targetNames.map(n=>[norm(n),n]));let pending={};deliveryDate.value=new Date().toISOString().slice(0,10);const drop=document.getElementById('drop'),file=document.getElementById('file');drop.onclick=()=>file.click();file.onchange=e=>e.target.files[0]&&readFile(e.target.files[0]);drop.ondragover=e=>e.preventDefault();drop.ondrop=e=>{e.preventDefault();e.dataTransfer.files[0]&&readFile(e.dataTransfer.files[0])};
function numeric(v){if(typeof v==='number'&&isFinite(v))return v;const t=String(v??'').trim().replace(/,/g,'');return /^[-+]?\d+(\.\d+)?$/.test(t)?Number(t):null}
async function readFile(f){const wb=XLSX.read(await f.arrayBuffer(),{type:'array',cellDates:true});let found={};for(const sn of wb.SheetNames){const a=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:null,raw:false});a.forEach((row,ri)=>row.forEach((v,ci)=>{const name=targetMap.get(norm(v));if(!name)return;let val=null;for(let c=ci+1;c<row.length;c++){const n=numeric(row[c]);if(n!==null){val=n;break}}if(val!==null)found[name]=val}))}pending=found;renderRows();result.classList.remove('hidden');status.innerHTML=`<p class="${Object.keys(found).length?'ok':'bad'}">辨識到 ${Object.keys(found).length}／${targetNames.length} 個品項｜${f.name}</p>`}
function renderRows(){rows.innerHTML=targetNames.map((n,i)=>{const e=pending[n];if(e===undefined)return'';return `<tr data-name="${encodeURIComponent(n)}"><td>${i+1}</td><td>${n}</td><td class="expected">${e}</td><td><input class="actual" type="number" step="0.01" oninput="checkRow(this)"></td><td class="delta">—</td><td><select class="reason" onchange="checkRow(this)"><option value="">無差異</option><option>央廚少出</option><option>央廚多出</option><option>現場漏收</option><option>單位不符</option><option>破損／退貨</option><option>其他</option></select></td></tr>`}).join('')}
function checkRow(el){const tr=el.closest('tr'),e=Number(tr.querySelector('.expected').textContent),a=Number(tr.querySelector('.actual').value),d=a-e;tr.querySelector('.delta').textContent=Number.isFinite(a)?(d>0?`+${d}`:d):'—';tr.classList.toggle('diff',Number.isFinite(a)&&d!==0);if(d===0)tr.querySelector('.reason').value=''}
function fillActual(){document.querySelectorAll('tbody tr').forEach(tr=>{tr.querySelector('.actual').value=tr.querySelector('.expected').textContent;checkRow(tr.querySelector('.actual'))})}
async function saveVerified(){if(!receiver.value.trim())return alert('請填收貨人');const values={},issues=[];for(const tr of document.querySelectorAll('tbody tr')){const n=decodeURIComponent(tr.dataset.name),e=Number(tr.querySelector('.expected').textContent),a=Number(tr.querySelector('.actual').value),reason=tr.querySelector('.reason').value;if(!Number.isFinite(a))return alert(`尚未填實到：${n}`);if(a!==e&&!reason)return alert(`到貨有差異，請選原因：${n}`);values[n]=a;if(a!==e)issues.push({name:n,expected:e,actual:a,difference:a-e,reason})}const data={deliveryDate:deliveryDate.value,receiver:receiver.value.trim(),values,expected:pending,issues,verified:true,updatedAt:new Date().toLocaleString('zh-TW')};localStorage.setItem('kos-import-central-current',JSON.stringify(data));try{await db.collection('deliveries').doc(deliveryDate.value).set(data);alert(`已同步到貨資料；差異 ${issues.length} 筆`)}catch(e){console.error(e);alert('雲端同步失敗，已先保存在本機')}}
</script></body></html>
