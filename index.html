<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#102a43">
<link rel="manifest" href="manifest.webmanifest">
<title>Kitchen OS｜PIZZA 驗證版</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f6f8;color:#18212b;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}.app{max-width:760px;margin:auto;min-height:100vh;padding-bottom:88px}.top{position:sticky;top:0;z-index:9;background:#102a43;color:white;padding:16px 16px 12px}.top h1{font-size:20px;margin:0 0 4px}.top small{opacity:.8}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#fff;border-bottom:1px solid #dbe2ea;position:sticky;top:73px;z-index:8}.tab{border:0;background:#fff;padding:14px;font-weight:700;color:#66788a}.tab.active{color:#102a43;border-bottom:3px solid #102a43}.wrap{padding:14px}.panel{display:none}.panel.active{display:block}.card{background:#fff;border:1px solid #e0e6ed;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(16,42,67,.04)}.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px}.meta .full{grid-column:1/-1}label{display:block;font-size:12px;font-weight:700;color:#5d6b78;margin-bottom:5px}input,select,textarea{width:100%;border:1px solid #cbd5df;border-radius:10px;padding:11px;font-size:16px;background:#fff}input[type=number]{text-align:center}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:#eef3f7;border-radius:10px;padding:10px;text-align:center}.metric b{display:block;font-size:19px}.metric span{font-size:11px;color:#627180}.row-head{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:10px}.name{font-weight:800;font-size:17px}.note{font-size:12px;color:#687887;margin-top:3px}.badge{font-size:12px;font-weight:800;padding:5px 8px;border-radius:99px;white-space:nowrap}.ok{background:#e8f6ed;color:#19713a}.warn{background:#fff1e8;color:#a7470a}.empty{background:#eef2f6;color:#677584}.fields{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.calc{margin-top:10px;padding:10px;border-radius:10px;background:#f5f7fa;font-size:13px;line-height:1.55}.calc strong{font-size:16px}.danger{background:#fff0ed;border:1px solid #ffc8bc;color:#a32613}.help{font-size:12px;color:#657585;line-height:1.6}.actions{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);border-top:1px solid #dce3ea;padding:10px max(12px,env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));display:flex;gap:8px;z-index:12}.actions button{flex:1;border:0;border-radius:11px;padding:13px 8px;font-size:15px;font-weight:800}.secondary{background:#e8edf2;color:#25384a}.primary{background:#102a43;color:#fff}.danger-btn{background:#ffe8e3;color:#a72f1a}.section-title{font-size:15px;font-weight:800;margin:18px 2px 10px}.pill{display:inline-block;background:#e7edf4;border-radius:999px;padding:4px 8px;font-size:11px;color:#4e6071;margin-top:5px}.switchline{display:flex;align-items:center;justify-content:space-between;gap:12px}.switchline input{width:90px}.hidden{display:none}@media(max-width:480px){.fields{grid-template-columns:1fr 1fr}.fields>div:last-child{grid-column:1/-1}.meta{grid-template-columns:1fr}.meta .full{grid-column:auto}.top{padding-top:calc(14px + env(safe-area-inset-top))}.tabs{top:calc(71px + env(safe-area-inset-top))}}
</style>
</head>
<body><div class="app">
<header class="top"><h1>Kitchen OS｜PIZZA</h1><small>v0.2 現場驗證版・資料儲存在此裝置</small></header>
<nav class="tabs"><button class="tab active" data-tab="central">央廚盤點</button><button class="tab" data-tab="prep">備料盤點</button></nav>
<main class="wrap">
<section id="central" class="panel active">
<div class="card meta">
<div><label>盤點日期</label><input id="date" type="date"></div>
<div><label>門店</label><select id="store"><option>101</option><option>南港</option><option>大巨蛋</option></select></div>
<div class="full"><label>盤點人員</label><input id="person" placeholder="輸入姓名"></div>
<div class="full switchline"><div><b>異常門檻</b><div class="help">當推算使用量達可用庫存的此比例，就標示紅色異常。</div></div><input id="threshold" type="number" min="10" max="100" step="5" value="60"></div>
</div>
<div class="card"><div class="summary"><div class="metric"><b id="doneCount">0</b><span>已填品項</span></div><div class="metric"><b id="abnormalCount">0</b><span>異常品項</span></div><div class="metric"><b id="deliveryCount">0</b><span>今日有到貨</span></div></div><p class="help">驗證方式：昨日庫存＋今日到貨－今日盤點＝推算使用量。系統只在差異過大或今日盤點超過可用庫存時跳異常，並不直接判定一定盤錯。</p></div>
<div id="centralList"></div>
</section>
<section id="prep" class="panel">
<div class="card"><b>PIZZA 備料盤點</b><p class="help">先保留簡單驗證：輸入盤點與預估，系統顯示是否需要備料；備料量依目前確認規則，庫存不足時顯示未來三日預估總和。</p></div>
<div id="prepList"></div>
</section>
</main></div>
<div class="actions"><button class="danger-btn" id="clearBtn">清除今日</button><button class="secondary" id="saveBtn">暫存</button><button class="primary" id="finishBtn">完成盤點</button></div>
<script>
const centralItems=[
 {id:'pepperoni',name:'美式臘腸',unit:'KG',note:'1包500g，2包=1KG'},
 {id:'dough',name:'冷凍 Pizza 麵團',unit:'包',note:'275g × 6顆／包'},
 {id:'cheese_mix',name:'綜合起司包',unit:'包',note:'10份／包'},
 {id:'fontal',name:'佛特樂起司',unit:'包',note:'央廚規格2.5KG／包；站上一盒400g'},
 {id:'bacon',name:'乾熟醃燻畢可培根',unit:'KG',note:'1包600g，2包=1.2KG'},
 {id:'potato',name:'烤馬鈴薯片',unit:'包',note:'1KG／包'},
 {id:'sausage',name:'畢可客製義式絞肉',unit:'KG',note:'1KG／包；成品一盒400g約0.5包'},
 {id:'ricotta',name:'瑞可塔起司 Ricotta',unit:'包',note:'1000G／包'},
 {id:'farmer',name:'農夫派底醬',unit:'包',note:'1800G／包'},
 {id:'mushroom',name:'香菇派底醬',unit:'包',note:'1100G／包'},
 {id:'egg',name:'田心蛋／溫泉蛋',unit:'盒',note:'10顆／盒'},
 {id:'honey',name:'辣蜂蜜',unit:'包',note:'250G／包'},
 {id:'olive',name:'冷壓初榨橄欖油',unit:'罐',note:'3公升；只盤桶裝'},
 {id:'truffle',name:'黑松露油',unit:'罐',note:'250ml；只盤桶裝'}
];
const deliveries={
 '2026-07-22':{ricotta:3,egg:9,farmer:3,mushroom:1},
 '2026-07-23':{potato:15,bacon:8,sausage:6}
};
const prepItems=[
 {id:'mozzarella',name:'馬茲瑞拉起司 1cm寬',unit:'盒',life:'D+3'},
 {id:'pizza_sauce',name:'Pizza 醬',unit:'盒',life:'D+3'},
 {id:'basil',name:'甜羅勒葉／片',unit:'kg',life:'D+3'},
 {id:'shallot',name:'乾蔥圈 0.2cm',unit:'盒',life:'D+3'},
 {id:'fontal_prep',name:'佛特樂乾酪 1×1cm',unit:'盒',life:'退+5／凍+30',note:'一盒400g'},
 {id:'parmesan',name:'帕馬森起司塊',unit:'g',life:'D+7／凍+30'},
 {id:'five_cheese',name:'退冰 5-Cheese',unit:'份',life:'退D+5／凍+30'},
 {id:'garlic',name:'蒜片 0.2cm',unit:'盒',life:'D+3'},
 {id:'italian_meat',name:'義式絞肉',unit:'盒',life:'D+3',note:'400g／盒'},
 {id:'mushroom_prep',name:'香菇 0.3cm',unit:'盒',life:'D+3'},
 {id:'arugula',name:'芝麻葉',unit:'g',life:'D+3'},
 {id:'dough_need',name:'當日 Pizza 麵團',unit:'顆',life:'D+2'}
];
let state={};
const $=s=>document.querySelector(s);
function today(){return new Date().toISOString().slice(0,10)}
function key(date){return 'kitchenOS_pizza_'+date}
function priorKey(date){const d=new Date(date+'T00:00:00');d.setDate(d.getDate()-1);return key(d.toISOString().slice(0,10))}
function num(v){const n=parseFloat(v);return Number.isFinite(n)?n:0}
function load(){const d=$('#date').value;state=JSON.parse(localStorage.getItem(key(d))||'{}');const prior=JSON.parse(localStorage.getItem(priorKey(d))||'{}');state.central=state.central||{};state.prep=state.prep||{};state.person=state.person||'';state.store=state.store||'101';state.threshold=state.threshold||60;centralItems.forEach(i=>{state.central[i.id]=state.central[i.id]||{};if(state.central[i.id].prev==null && prior.central?.[i.id]?.today!=null)state.central[i.id].prev=prior.central[i.id].today;});$('#person').value=state.person;$('#store').value=state.store;$('#threshold').value=state.threshold;render();}
function save(silent=false){state.person=$('#person').value.trim();state.store=$('#store').value;state.threshold=num($('#threshold').value)||60;localStorage.setItem(key($('#date').value),JSON.stringify(state));if(!silent)alert('已暫存在這台裝置');}
function statusFor(i){const x=state.central[i.id]||{}, prev=num(x.prev), delivery=x.delivery==null?num(deliveries[$('#date').value]?.[i.id]):num(x.delivery), current=num(x.today);if(x.today==null||x.today==='')return {cls:'empty',text:'未填',usage:0,available:prev+delivery,delivery};const available=prev+delivery,usage=available-current,ratio=available>0?usage/available*100:0,threshold=num($('#threshold').value)||60;const bad=current>available+0.0001 || usage<0 || (available>0&&usage>0&&ratio>=threshold);return {cls:bad?'warn':'ok',text:bad?'異常':'正常',usage,available,delivery,ratio,bad};}
function renderCentral(){const list=$('#centralList');list.innerHTML='';let done=0,bad=0,del=0;centralItems.forEach(i=>{const x=state.central[i.id]||{},s=statusFor(i);if(x.today!==undefined&&x.today!=='')done++;if(s.bad)bad++;if(s.delivery>0)del++;const c=document.createElement('div');c.className='card';c.innerHTML=`<div class="row-head"><div><div class="name">${i.name}</div><div class="note">${i.note}・盤點單位：${i.unit}</div>${s.delivery>0?`<span class="pill">本日訂單到貨 +${s.delivery} ${i.unit}</span>`:''}</div><span class="badge ${s.cls}">${s.text}</span></div><div class="fields"><div><label>昨日庫存</label><input data-kind="central" data-id="${i.id}" data-field="prev" type="number" inputmode="decimal" step="0.01" value="${x.prev??''}" placeholder="0"></div><div><label>今日到貨</label><input data-kind="central" data-id="${i.id}" data-field="delivery" type="number" inputmode="decimal" step="0.01" value="${x.delivery??s.delivery||''}" placeholder="0"></div><div><label>今日盤點</label><input data-kind="central" data-id="${i.id}" data-field="today" type="number" inputmode="decimal" step="0.01" value="${x.today??''}" placeholder="0"></div></div><div class="calc ${s.bad?'danger':''}">可用庫存：<strong>${fmt(s.available)} ${i.unit}</strong>　推算使用：<strong>${fmt(s.usage)} ${i.unit}</strong>${s.bad?'<br>🔴 差異過大，請確認盤點、到貨、報廢或轉店。':''}</div>`;list.appendChild(c);});$('#doneCount').textContent=done;$('#abnormalCount').textContent=bad;$('#deliveryCount').textContent=del;bindInputs();}
function fmt(n){return Math.round(n*100)/100}
function renderPrep(){const list=$('#prepList');list.innerHTML='';prepItems.forEach(i=>{const x=state.prep[i.id]||{};const inventory=num(x.inventory),f1=num(x.f1),f2=num(x.f2),f3=num(x.f3),need=inventory>=f1?0:f1+f2+f3;const c=document.createElement('div');c.className='card';c.innerHTML=`<div class="row-head"><div><div class="name">${i.name}</div><div class="note">${i.unit}・效期 ${i.life}${i.note?'・'+i.note:''}</div></div><span class="badge ${need>0?'warn':'ok'}">${need>0?'需備料':'足夠'}</span></div><div class="fields"><div><label>目前盤點</label><input data-kind="prep" data-id="${i.id}" data-field="inventory" type="number" step="0.01" value="${x.inventory??''}"></div><div><label>今日預估</label><input data-kind="prep" data-id="${i.id}" data-field="f1" type="number" step="0.01" value="${x.f1??''}"></div><div><label>明日預估</label><input data-kind="prep" data-id="${i.id}" data-field="f2" type="number" step="0.01" value="${x.f2??''}"></div><div><label>後日預估</label><input data-kind="prep" data-id="${i.id}" data-field="f3" type="number" step="0.01" value="${x.f3??''}"></div></div><div class="calc">建議備料：<strong>${fmt(need)} ${i.unit}</strong></div>`;list.appendChild(c);});bindInputs();}
function bindInputs(){document.querySelectorAll('input[data-kind]').forEach(el=>el.oninput=()=>{const k=el.dataset.kind,id=el.dataset.id,f=el.dataset.field;state[k][id]=state[k][id]||{};state[k][id][f]=el.value;save(true);render();});}
function render(){renderCentral();renderPrep();}
$('.tabs').addEventListener('click',e=>{if(!e.target.dataset.tab)return;document.querySelectorAll('.tab,.panel').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');$('#'+e.target.dataset.tab).classList.add('active');});
$('#date').value=today();$('#date').onchange=load;$('#saveBtn').onclick=()=>save();$('#finishBtn').onclick=()=>{save(true);const bad=centralItems.filter(i=>statusFor(i).bad).length;alert(bad?`盤點已完成，目前有 ${bad} 項異常需要確認。`:'盤點已完成，未發現明顯異常。');};$('#clearBtn').onclick=()=>{if(confirm('確定清除這一天的資料？')){localStorage.removeItem(key($('#date').value));load();}};['person','store','threshold'].forEach(id=>$('#'+id).onchange=()=>{save(true);render();});
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));load();
</script></body></html>
