<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;

    padding: 16px;

  .station-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .station-btn {
    background: #fff;
    border: 1px solid #e0ddd3;
    border-radius: 14px;
    padding: 24px 12px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
  }
  .station-btn:active { background: #eee; }
  .station-btn.disabled { color: #bbb; }
  .back-btn {
    display: inline-block;
    margin-bottom: 12px;
    font-size: 14px;
    color: #666;
    cursor: pointer;
    padding: 6px 0;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0ddd3;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .card p.title {
    font-weight: 600;
    font-size: 16px;
    margin: 0 0 10px;
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .input-row label {
    font-size: 13px;
    color: #666;
    white-space: nowrap;
  }
  .input-row input {
    width: 110px;
    height: 36px;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 0 10px;
    font-size: 15px;
  }
  .input-row span.unit {
    font-size: 13px;
    color: #999;
  }
  .row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    padding: 6px 0;
    border-bottom: 1px solid #eee;
  }
  .row:last-child { border-bottom: none; }
  .row span.name { color: #555; }
  .row span.val { font-weight: 600; }
  .note {
    font-size: 12px;
    color: #999;
    margin-top: 6px;
  }

  .allergen-btn {
    grid-column: 1 / -1;
    background: #fff7e8;
    border-color: #e7c98f;
    color: #704d10;
  }
  .allergen-toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #f5f4f0;
    padding: 2px 0 12px;
  }
  .search-box {
    width: 100%;
    height: 44px;
    border: 1px solid #cfc9bb;
    border-radius: 10px;
    padding: 0 13px;
    font-size: 16px;
    background: #fff;
  }
  .allergen-summary {
    margin: 10px 0 0;
    font-size: 13px;
    color: #6d675c;
  }
  .allergen-card .product-code {
    font-size: 12px;
    color: #999;
    margin-bottom: 8px;
  }
  .allergen-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0 12px;
  }
  .allergen-tag {
    display: inline-block;
    padding: 5px 9px;
    border-radius: 999px;
    background: #fff0d6;
    border: 1px solid #efd19b;
    color: #714c0a;
    font-size: 13px;
    font-weight: 600;
  }
  .material-title {
    margin: 0 0 5px;
    color: #666;
    font-size: 12px;
    font-weight: 600;
  }
  .material-text {
    margin: 0;
    font-size: 13px;
    line-height: 1.65;
    color: #3f3f3f;
    white-space: pre-wrap;
  }
  .warning-box {
    background: #fff8e8;
    border: 1px solid #ead5a5;
    color: #654a15;
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 12px;
    line-height: 1.55;
    margin-bottom: 12px;
  }
  .empty-state {
    background: #fff;
    border: 1px dashed #cfc9bb;
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    color: #777;
  }
  details.merged-list {
    background: #fff;
    border: 1px solid #e0ddd3;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  details.merged-list summary {
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  .merged-item {
    padding: 8px 0;
    border-bottom: 1px solid #eee;
    font-size: 13px;
  }
  .merged-item:last-child { border-bottom: none; }
  .merged-code { color: #999; font-size: 12px; }

</style>

function fmt(n){ return (Math.round(n*10)/10).toLocaleString(); }

function fmtKg(g){
  let s = (g/1000).toFixed(3);
  s = s.replace(/0+$/,'').replace(/\.$/,'');
  if(s==='' || s==='-0') s='0';
  return s + ' kg';
}

function fmtLine(n,g,unit,packSize,packUnit,groupSize,groupUnit,displayKg){
  let text = displayKg ? fmtKg(g) : fmt(g)+' '+(unit||'g');
  if(packSize){
    const packQty = g/packSize;
    text += ` (≈${fmt(packQty)} ${packUnit||'罐'}`;
    if(groupSize){ text += `，約${fmt(packQty/groupSize)} ${groupUnit||'組'}`; }
    text += `)`;
  }
  return [n, text];
}

function inputRowHtml(label, id, placeholder, unit){
  return `<div class="input-row">
    <label>${label}</label>
    <input type="number" min="0" step="0.1" id="${id}" placeholder="${placeholder}" />
    <span class="unit">${unit}</span>
  </div>`;
}

function rowsHtml(rows){
  return rows.map(([n,v])=>`<div class="row"><span class="name">${n}</span><span class="val">${v}</span></div>`).join('');
}

function escapeHtml(text){
  return String(text ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function splitAllergens(text){
  return String(text || '')
    .split(/[、，,／/]+/)
    .map(x=>x.trim())
    .filter(Boolean);
}

function showAllergens(){
  root.innerHTML = `
    <div class="back-btn" id="allergen-back">← 返回功能選擇</div>
    <h1>過敏原查詢</h1>
    <div class="warning-box">
      本頁依「產品過敏原」檔案建立，共 ${allergenData.length} 項主產品。查詢結果僅供現場快速確認；
      遇到嚴重過敏、原料替換、供應商配方變更或交叉接觸疑慮時，仍須再次核對最新包裝標示與內部規範。
    </div>
    <div class="allergen-toolbar">
      <input class="search-box" id="allergen-search" type="search"
        placeholder="搜尋產品、編號、過敏原或材料，例如：芝麻、雞肝、CKH000010">
      <div class="allergen-summary" id="allergen-summary"></div>
    </div>
    <details class="merged-list">
      <summary>查看併入主產品、不單獨列出的 ${mergedAllergenData.length} 項材料</summary>
      <div id="merged-items"></div>
    </details>
    <div id="allergen-results"></div>`;
  document.getElementById('allergen-back').onclick = showHome;
  const search = document.getElementById('allergen-search');
  search.addEventListener('input', ()=>renderAllergenResults(search.value));
  document.getElementById('merged-items').innerHTML = mergedAllergenData.map(item=>`
    <div class="merged-item">
      <div>${escapeHtml(item.name)}</div>
      <div class="merged-code">${escapeHtml(item.code)}</div>
    </div>`).join('');
  renderAllergenResults('');
  setTimeout(()=>search.focus(), 0);
}

function renderAllergenResults(keyword){
  const q = String(keyword || '').trim().toLowerCase();
  const list = allergenData.filter(item=>{
    const haystack = [item.code,item.name,item.allergens,item.materials].join(' ').toLowerCase();
    return !q || haystack.includes(q);
  });
  document.getElementById('allergen-summary').textContent =
    q ? `找到 ${list.length} 項符合「${keyword.trim()}」的結果` : `目前顯示全部 ${list.length} 項產品`;
  const results = document.getElementById('allergen-results');
  if(list.length===0){
    results.innerHTML = `<div class="empty-state">找不到符合的產品。可改用較短的關鍵字，例如「奶」、「芝麻」、「醋」或產品編號。</div>`;
    return;
  }
  results.innerHTML = list.map(item=>{
    const tags = splitAllergens(item.allergens)
      .map(tag=>`<span class="allergen-tag">${escapeHtml(tag)}</span>`).join('');
    return `<div class="card allergen-card">
      <p class="title">${escapeHtml(item.name)}</p>
      <div class="product-code">${escapeHtml(item.code)}</div>
      <div class="allergen-tags">${tags || '<span class="allergen-tag">未標示</span>'}</div>
      <p class="material-title">過敏原來源材料</p>
      <p class="material-text">${escapeHtml(item.materials || '未提供')}</p>
    </div>`;
  }).join('');
}


function showStation(stationKey){
  const station = stations[stationKey];
  root.innerHTML = `<div class="back-btn" id="back-btn">← 返回工作站選擇</div><h1>${station.name}回推計算機</h1><div id="app"></div>`;
  document.getElementById('back-btn').onclick = showHome;
  const app = document.getElementById('app');

  station.items.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'card';
    let controlHtml = '';
    let noteHtml = '';

    if(item.mode==='weight') controlHtml = inputRowHtml('目標總重','in-'+item.key,'例如 500','g');
    if(item.mode==='weightBox'){
      controlHtml = inputRowHtml(`盤點${item.boxUnit}數(${item.boxSize}g/${item.boxUnit})`,'in-'+item.key,'例如 3',item.boxUnit);
      if(item.key==='mushroom_ingredients'){
        noteHtml = '<p class="note">基礎配方：香菇1kg＋蘑菇1kg＋鴻禧菇6包（150g/包），混勻後以1kg/盒分裝。</p>';
      }
    }
    if(item.mode==='burrata'){
      controlHtml = inputRowHtml('醃汁總重(玉米糖漿+蕃茄醃汁)','in-'+item.key,'例如 300','g');
      noteHtml = '<p class="note">糖膠=醃汁×5%，初榨橄欖油=醃汁÷3（醃汁:油=3:1）</p>';
    }
    if(item.mode==='batch'){
      controlHtml = inputRowHtml('倍數(幾份基礎配方)','in-'+item.key,'1','倍');
      noteHtml = '<p class="note">此品項無固定盒重，盒數僅為分裝參考，不影響用量</p>';
    }
    if(item.mode==='cook'){
      controlHtml = inputRowHtml(`目標盒數(每盒${item.boxSize}g熟重)`,'in-'+item.key,'例如 4','盒');
      const rawDesc = item.raw.map(([n,b])=>`${n}${b}g`).join(':');
      noteHtml = `<p class="note">生料 ${rawDesc}，煮熟約得${item.cookedBase}g，依此比例回推生料用量</p>`;
    }
    if(item.mode==='pack'){
      controlHtml = inputRowHtml('目標重量','in-'+item.key,'例如 500','g');
      noteHtml = `<p class="note">包裝規格 ${item.packSize}g/${item.packUnit}</p>`;
    }
    if(item.mode==='packInv'){
      controlHtml = inputRowHtml('盤點盒數','in-'+item.key,'例如 3',item.packUnit);
      noteHtml = `<p class="note">包裝規格 ${item.packSize}g/${item.packUnit}</p>`;
    }
    if(item.mode==='packInv2'){
      controlHtml = inputRowHtml('盤點盒數','in-'+item.key,'例如 2',item.boxUnit);
      noteHtml = `<p class="note">${item.boxSize}g/${item.boxUnit}，換算成 ${item.bagSize}g/${item.bagUnit}</p>`;
    }
    if(item.mode==='cookYield'){
      controlHtml = inputRowHtml(`盤點${item.boxUnit}數(每${item.boxUnit}${item.boxSize}g熟重)`,'in-'+item.key,'例如 2',item.boxUnit);
      const packNote = item.rawPackSize ? `，${item.rawName}換算單位 ${item.rawPackSize}g/${item.rawPackUnit}` : '';
      noteHtml = `<p class="note">生熟轉換率 ${item.yieldRatio*100}%（1kg生料烤完約${item.yieldRatio*1000}g）${packNote}</p>`;
    }
    if(item.mode==='cookYieldWeight'){
      controlHtml = inputRowHtml('熟品盤點重量','in-'+item.key,'例如 800','g');
      const packNote = item.rawPackSize ? `，${item.rawName}換算單位 ${item.rawPackSize}g/${item.rawPackUnit}` : '';
      noteHtml = `<p class="note">生熟轉換率 ${item.yieldRatio*100}%（1kg生料處理完約${item.yieldRatio*1000}g熟重）${packNote}</p>`;
    }
    if(item.mode==='yieldPackInv'){
      controlHtml = inputRowHtml(`盤點${item.boxUnit}數(${item.boxSize}g/${item.boxUnit})`,'in-'+item.key,'例如 2',item.boxUnit);
    }
    if(item.mode==='joelTomato'){
      controlHtml = inputRowHtml(`盤點${item.boxUnit}數(${item.boxSize}g/${item.boxUnit})`,'in-'+item.key,'例如 2',item.boxUnit);
    }
    if(item.mode==='bucketPack'){
      controlHtml = inputRowHtml(`盤點${item.boxUnit}數`,'in-'+item.key,'例如 2',item.boxUnit);
      noteHtml = `<p class="note">每${item.boxUnit}換算 ${item.packFactor} ${item.packUnit}</p>`;
    }
    if(item.customNote) noteHtml = `<p class="note">${item.customNote}</p>`;

    card.innerHTML = `<p class="title">${item.name}</p>${controlHtml}<div id="out-${item.key}"></div>${noteHtml}`;
    app.appendChild(card);

    const inputEl = card.querySelector('#in-'+item.key);
    const outEl = card.querySelector('#out-'+item.key);

    function render(){
      const v = parseFloat(inputEl.value);
      let rows;

      if(item.mode==='weight' || item.mode==='weightBox'){
        const targetWeight = item.mode==='weightBox' ? v*item.boxSize : v;
        const kgOut = item.displayUnit==='kg';
        if(!v || v<=0){ outEl.innerHTML = rowsHtml(item.ing.map(([n,b,packSize,packUnit,groupSize,groupUnit])=>{
          const line = fmtLine(n,b,'g',packSize,packUnit,groupSize,groupUnit,kgOut);
          return [line[0], line[1]+' (基礎)'];
        })); return; }
        const scale = targetWeight/item.base;
        rows = item.ing.map(([n,b,packSize,packUnit,groupSize,groupUnit])=>fmtLine(n,b*scale,'g',packSize,packUnit,groupSize,groupUnit,kgOut));
        if(item.mode==='weightBox'){ rows.unshift(['目標總重', (kgOut?fmtKg(targetWeight):fmt(targetWeight)+' g')+'（'+fmt(v)+' '+item.boxUnit+' x '+item.boxSize+'g）']); }
      } else if(item.mode==='burrata'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['玉米糖膠(醃汁5%)','—'],['初榨橄欖油(醃汁/3)','—']]); return; }
        rows = [
          ['醃汁(玉米糖漿+蕃茄醃汁)', fmt(v)+' g'],
          ['玉米糖膠(醃汁5%)', fmt(v*0.05)+' g'],
          fmtLine('初榨橄欖油(醃汁:油=3:1)', v/3, 'g', 2760, '瓶')
        ];
      } else if(item.mode==='batch'){
        const scale = (!v || v<=0) ? 1 : v;
        rows = item.ing.map(([n,b,u,packSize,packUnit,groupSize,groupUnit])=>fmtLine(n,b*scale,u,packSize,packUnit,groupSize,groupUnit));
      } else if(item.mode==='cook'){
        const baseBoxes = item.cookedBase/item.boxSize;
        if(!v || v<=0){ outEl.innerHTML = rowsHtml(item.raw.map(([n,b,packSize,packUnit])=>{
          const line = fmtLine(n,b,'g',packSize,packUnit);
          return [line[0], line[1]+` (基礎，${item.cookedBase}g熟重/${fmt(baseBoxes)}盒)`];
        })); return; }
        const cookedTarget = v*item.boxSize;
        const scale = cookedTarget/item.cookedBase;
        rows = item.raw.map(([n,b,packSize,packUnit])=>fmtLine(n,b*scale,'g',packSize,packUnit));
        rows.unshift(['預估熟重目標', fmt(cookedTarget)+' g（'+fmt(v)+' 盒 x '+item.boxSize+'g）']);
      } else if(item.mode==='pack'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([fmtLine('需要數量', item.packSize, 'g', item.packSize, item.packUnit)]); return; }
        rows = [fmtLine('需要數量', v, 'g', item.packSize, item.packUnit)];
      } else if(item.mode==='packInv'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['總重', '—']]); return; }
        const totalG = v*item.packSize;
        const totalText = item.displayUnit==='kg' ? fmtKg(totalG) : fmt(totalG)+' g';
        rows = [['總重', totalText+'（'+fmt(v)+' '+item.packUnit+' x '+item.packSize+'g）']];
      } else if(item.mode==='packInv2'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['總重','—'],['換算包數','—']]); return; }
        const totalG = v*item.boxSize;
        rows = [
          ['總重', fmt(totalG)+' g（'+fmt(v)+' '+item.boxUnit+' x '+item.boxSize+'g）'],
          ['換算包數', fmt(totalG/item.bagSize)+' '+item.bagUnit]
        ];
      } else if(item.mode==='cookYield'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['熟重目標','—'],['需要生料重量','—']]); return; }
        const cookedTotal = v*item.boxSize;
        const rawNeeded = cookedTotal/item.yieldRatio;
        rows = [
          ['熟重目標', fmt(cookedTotal)+' g（'+fmt(v)+' '+item.boxUnit+' x '+item.boxSize+'g）'],
          ['需要'+item.rawName, fmt(rawNeeded/1000)+' kg']
        ];
        if(item.rawPackSize){
          rows.push(['換算包數', fmt(rawNeeded/item.rawPackSize)+' '+item.rawPackUnit]);
        }
      } else if(item.mode==='cookYieldWeight'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['需要生料重量','—'],['換算盒數','—']]); return; }
        const rawNeeded = v/item.yieldRatio;
        rows = [
          ['熟重輸入', fmt(v)+' g'],
          ['需要'+item.rawName, fmtKg(rawNeeded)]
        ];
        if(item.rawPackSize){
          rows.push(['換算'+item.rawPackUnit+'數', fmt(rawNeeded/item.rawPackSize)+' '+item.rawPackUnit]);
        }
      } else if(item.mode==='yieldPackInv'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['成品總重','—'],['需要包數','—']]); return; }
        const totalG = v * item.boxSize;
        const packs = totalG / item.yieldPerPack;
        rows = [
          ['成品總重', fmtKg(totalG)+'（'+fmt(v)+' '+item.boxUnit+'）'],
          ['需要波隆那肉醬', fmt(packs)+' '+item.rawPackUnit],
          ['原料包裝重量', fmtKg(packs*item.rawPackSize)]
        ];
      } else if(item.mode==='joelTomato'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['成品總重','—'],['番茄罐頭','—'],['糖','—'],['鹽','—']]); return; }
        const cans = v / 1.25;
        rows = [
          ['成品總重', fmtKg(v*item.boxSize)+'（'+fmt(v)+' '+item.boxUnit+'）'],
          ['喬爾碎粒番茄(大)', fmt(cans)+' 罐（2.5kg/罐）'],
          ['番茄罐頭重量', fmtKg(cans*2500)],
          ['糖', fmt(cans*53.5)+' g'],
          ['鹽', fmt(cans*17.8)+' g']
        ];
      } else if(item.mode==='bucketPack'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['換算包數','—']]); return; }
        rows = [['換算包數', fmt(v*item.packFactor)+' '+item.packUnit]];
      }
      outEl.innerHTML = rowsHtml(rows);
    }
    inputEl.addEventListener('input', render);
    render();
  });
}

showHome();
</script>
