<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廚房回推計算機</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f5f4f0;
    color: #222;
    margin: 0;
    padding: 16px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 16px;
  }
  .station-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .station-btn {
    background: #fff;
    border: 1px solid #e0ddd3;
    border-radius: 14px;
    padding: 24px 12px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
  }
  .station-btn:active { background: #eee; }
  .station-btn.disabled { color: #bbb; }
  .back-btn {
    display: inline-block;
    margin-bottom: 12px;
    font-size: 14px;
    color: #666;
    cursor: pointer;
    padding: 6px 0;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0ddd3;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .card p.title {
    font-weight: 600;
    font-size: 16px;
    margin: 0 0 10px;
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .input-row label {
    font-size: 13px;
    color: #666;
    white-space: nowrap;
  }
  .input-row input {
    width: 110px;
    height: 36px;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 0 10px;
    font-size: 15px;
  }
  .input-row span.unit {
    font-size: 13px;
    color: #999;
  }
  .row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    padding: 6px 0;
    border-bottom: 1px solid #eee;
  }
  .row:last-child { border-bottom: none; }
  .row span.name { color: #555; }
  .row span.val { font-weight: 600; }
  .note {
    font-size: 12px;
    color: #999;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div style="max-width:760px;margin:0 auto 14px;padding:12px 14px;background:#fff7d6;border:1px solid #ead28a;border-radius:10px;font-size:13px;line-height:1.55;color:#5b4a16;">
<strong>回推表驗證版</strong><br>請先檢查：品項名稱、輸入方式、包裝規格、配方比例與計算結果。S2 目前尚未建立。
</div>
<div id="root"></div>

<script>
const stations = {
  cold: { name:'冷台', items:[
    { key:'greens', name:'混合生菜', mode:'weight', base:1700,
      ing:[['羽衣甘藍',300,300,'盒'],['裁切美生菜',1400,700,'盒']] },
    { key:'cucumberslice', name:'小黃瓜片', mode:'packInv', packSize:400, packUnit:'盒' },
    { key:'redonion', name:'紫洋蔥絲', mode:'packInv', packSize:250, packUnit:'盒' },
    { key:'quinoa', name:'紅藜麥', mode:'cook',
      raw:[['紅藜麥',750,500,'BAG'],['RO水',1125],['鹽巴',17,1000,'包'],['蒜頭(需挑掉)',20]],
      cookedBase:1500, boxSize:250 },
    { key:'barley', name:'洋薏仁', mode:'cook',
      raw:[['洋薏仁',350,1000,'BAG'],['RO水',600],['鹽巴',3.5,1000,'包']],
      cookedBase:1000, boxSize:250 },
    { key:'tomato', name:'醃番茄(整批配方)', mode:'batch',
      ing:[['蕃茄醃汁',1,'包'],['小紅番茄',1000,'g'],['乾蔥',65,'g'],['百里香',5,'g'],['初榨橄欖油',350,'g',2760,'瓶'],['彩色番茄',1000,'g']] },
    { key:'burrata', name:'布拉塔蕃茄汁', mode:'burrata' },
    { key:'truffle', name:'松露醬', mode:'weightBox', base:240, boxSize:240, boxUnit:'罐',
      ing:[['黑松露醬',80,500,'CAN'],['布拉塔蕃茄醃汁',160]] },
    { key:'cheddar', name:'切達丁', mode:'packInv2', boxSize:250, boxUnit:'盒', bagSize:1000, bagUnit:'包' },
    { key:'corn', name:'玉米沙拉', mode:'weightBox', base:1550, boxSize:250, boxUnit:'盒',
      ing:[['玉米粒',1140,340,'罐',12,'組'],['紅椒丁',250],['檸檬汁',150],['鹽',5,1000,'包'],['糖',5,1000,'包']] },
    { key:'peanutcrumb', name:'花生碎', mode:'packInv2', boxSize:250, boxUnit:'盒', bagSize:1000, bagUnit:'BAG' },
    { key:'sesamecooked', name:'熟白芝麻', mode:'packInv2', boxSize:250, boxUnit:'盒', bagSize:1000, bagUnit:'BAG' },
    { key:'octopus', name:'章魚', mode:'packInv', packSize:375, packUnit:'盒', customNote:'1份75g x 5份/盒 = 375g/盒' },
    { key:'octosalad', name:'章魚沙拉', mode:'weightBox', base:10, boxSize:10, boxUnit:'盒',
      ing:[['芝麻葉',8,500,'包'],['西芹葉',2]] },
    { key:'sausage', name:'綠胡椒臘腸', mode:'packInv', packSize:250, packUnit:'盒' },
    { key:'vinai', name:'檸檬油醋', mode:'weightBox', base:246, boxSize:246, boxUnit:'罐',
      ing:[['黃檸檬汁',60],['RO水',60],['初榨橄欖油',120,2760,'瓶'],['鹽',3,1000,'包'],['糖',3,1000,'包']] },
    { key:'mint', name:'薄荷醬', mode:'weight', base:374,
      ing:[['羅望子醬',20,454,'罐'],['帕馬森起司粉',24,1000,'BAG'],['小茴香粉',12],['鹽巴',6,1000,'包'],['初榨橄欖油',150,2760,'瓶'],['綠檸檬皮',2],['柳橙丁',100],['薄荷',30],['平葉巴西里',10],['香菜',10],['蒜泥',10]] },
    { key:'cucumber', name:'醃漬小黃瓜丁', mode:'weight', base:146,
      ing:[['小黃瓜丁',100],['鹽',5,1000,'包'],['糖',1,1000,'包'],['蒜泥',10],['甘蔥碎',10],['亨氏白醋',20]] },
    { key:'apricot', name:'醃漬杏桃丁', mode:'weight', base:2,
      ing:[['杏桃切丁',1],['杏桃醃汁',1,100,'BAG']] }
  ]},
  pizza: { name:'PIZZA', items:[
    { key:'mozzarella', name:'馬茲瑞拉起司', mode:'packInv', packSize:4000, packUnit:'盒', displayUnit:'kg' },
    { key:'pizzasauce', name:'pizza醬', mode:'weightBox', base:2562.5, boxSize:5125, boxUnit:'盒',
      ing:[['ORO蕃茄罐頭',2500,2500,'桶'],['鹽',25,1000,'包'],['糖',37.5,1000,'包']] },
    { key:'shallotring', name:'乾蔥圈', mode:'packInv', packSize:400, packUnit:'盒' },
    { key:'fontal', name:'佛特樂-乾酪', mode:'packInv2', boxSize:500, boxUnit:'盒', bagSize:2500, bagUnit:'包' },
    { key:'italianmeat', name:'烤義式絞肉', mode:'cookYield', boxSize:400, boxUnit:'盒', yieldRatio:0.8,
      rawName:'生義式絞肉', rawPackSize:1000, rawPackUnit:'包' },
    { key:'mushroom', name:'烤香菇片', mode:'cookYield', boxSize:500, boxUnit:'盒', yieldRatio:0.5,
      rawName:'生香菇片' }
  ]},
  s1: { name:'S1', items:[
    { key:'mushroom_raw', name:'生混菇', mode:'cookYieldWeight', yieldRatio:0.8, rawName:'生混菇', rawPackSize:1000, rawPackUnit:'盒' },
    { key:'mushroom_ingredients', name:'生混菇(原料回推)', mode:'weightBox', base:2900, boxSize:1000, boxUnit:'盒',
      ing:[['香菇',1000],['蘑菇',1000],['鴻禧菇',900,150,'包']] },
    { key:'chive', name:'蝦夷蔥', mode:'packInv', packSize:25, packUnit:'盒', displayUnit:'kg' },
    { key:'mushroomjuice', name:'菇汁', mode:'packInv', packSize:500, packUnit:'盒' },
    { key:'chickenthigh', name:'分雞腿', mode:'packInv', packSize:110, packUnit:'份', displayUnit:'kg' },
    { key:'beefrib', name:'分牛肋', mode:'packInv', packSize:110, packUnit:'份', displayUnit:'kg' },
    { key:'burgerveg', name:'漢堡菜', mode:'weightBox', base:40, boxSize:40, boxUnit:'份', displayUnit:'kg',
      ing:[['牛蕃茄',30],['奶油萵苣',10]] },
    { key:'potato', name:'馬鈴薯', mode:'packInv', packSize:200, packUnit:'份', displayUnit:'kg' },
    { key:'shortrib', name:'牛小排', mode:'packInv', packSize:210, packUnit:'份', displayUnit:'kg' },
    { key:'eggwash', name:'蛋刷醬', mode:'weightBox', base:340, boxSize:340, boxUnit:'盒',
      ing:[['蛋白液',100,970,'罐'],['玉米澱粉',70,375,'盒'],['芥末子醬',170,1000,'罐']] },
    { key:'beefjus', name:'牛汁', mode:'weightBox', base:100, boxSize:100, boxUnit:'盒',
      ing:[['澄清牛肉汁',50],['褐色雞湯',50,200,'包']] },
    { key:'eggplant', name:'茄子', mode:'packInv', packSize:280, packUnit:'份', displayUnit:'kg' }
  ]},
  s2: { name:'S2', items:[] }
};

function fmt(n){ return (Math.round(n*10)/10).toLocaleString(); }

function fmtKg(g){
  let s = (g/1000).toFixed(3);
  s = s.replace(/0+$/,'').replace(/\.$/,'');
  if(s==='' || s==='-0') s='0';
  return s + ' kg';
}

function fmtLine(n,g,unit,packSize,packUnit,groupSize,groupUnit,displayKg){
  let text = displayKg ? fmtKg(g) : fmt(g)+' '+(unit||'g');
  if(packSize){
    const packQty = g/packSize;
    text += ` (≈${fmt(packQty)} ${packUnit||'罐'}`;
    if(groupSize){ text += `，約${fmt(packQty/groupSize)} ${groupUnit||'組'}`; }
    text += `)`;
  }
  return [n, text];
}

function inputRowHtml(label, id, placeholder, unit){
  return `<div class="input-row">
    <label>${label}</label>
    <input type="number" min="0" step="0.1" id="${id}" placeholder="${placeholder}" />
    <span class="unit">${unit}</span>
  </div>`;
}

function rowsHtml(rows){
  return rows.map(([n,v])=>`<div class="row"><span class="name">${n}</span><span class="val">${v}</span></div>`).join('');
}

const root = document.getElementById('root');

function showHome(){
  root.innerHTML = `<h1>選擇工作站</h1><div class="station-grid" id="station-grid"></div>`;
  const grid = document.getElementById('station-grid');
  Object.keys(stations).forEach(key=>{
    const st = stations[key];
    const btn = document.createElement('div');
    btn.className = 'station-btn' + (st.items.length===0 ? ' disabled' : '');
    btn.textContent = st.name + (st.items.length===0 ? '（尚未建立）' : '');
    btn.onclick = ()=>{ if(st.items.length>0) showStation(key); };
    grid.appendChild(btn);
  });
}

function showStation(stationKey){
  const station = stations[stationKey];
  root.innerHTML = `<div class="back-btn" id="back-btn">← 返回工作站選擇</div><h1>${station.name}回推計算機</h1><div id="app"></div>`;
  document.getElementById('back-btn').onclick = showHome;
  const app = document.getElementById('app');

  station.items.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'card';
    let controlHtml = '';
    let noteHtml = '';

    if(item.mode==='weight') controlHtml = inputRowHtml('目標總重','in-'+item.key,'例如 500','g');
    if(item.mode==='weightBox'){
      controlHtml = inputRowHtml(`盤點${item.boxUnit}數(${item.boxSize}g/${item.boxUnit})`,'in-'+item.key,'例如 3',item.boxUnit);
    }
    if(item.mode==='burrata'){
      controlHtml = inputRowHtml('醃汁總重(玉米糖漿+蕃茄醃汁)','in-'+item.key,'例如 300','g');
      noteHtml = '<p class="note">糖膠=醃汁×5%，初榨橄欖油=醃汁÷3（醃汁:油=3:1）</p>';
    }
    if(item.mode==='batch'){
      controlHtml = inputRowHtml('倍數(幾份基礎配方)','in-'+item.key,'1','倍');
      noteHtml = '<p class="note">此品項無固定盒重，盒數僅為分裝參考，不影響用量</p>';
    }
    if(item.mode==='cook'){
      controlHtml = inputRowHtml(`目標盒數(每盒${item.boxSize}g熟重)`,'in-'+item.key,'例如 4','盒');
      const rawDesc = item.raw.map(([n,b])=>`${n}${b}g`).join(':');
      noteHtml = `<p class="note">生料 ${rawDesc}，煮熟約得${item.cookedBase}g，依此比例回推生料用量</p>`;
    }
    if(item.mode==='pack'){
      controlHtml = inputRowHtml('目標重量','in-'+item.key,'例如 500','g');
      noteHtml = `<p class="note">包裝規格 ${item.packSize}g/${item.packUnit}</p>`;
    }
    if(item.mode==='packInv'){
      controlHtml = inputRowHtml('盤點盒數','in-'+item.key,'例如 3',item.packUnit);
      noteHtml = `<p class="note">包裝規格 ${item.packSize}g/${item.packUnit}</p>`;
    }
    if(item.mode==='packInv2'){
      controlHtml = inputRowHtml('盤點盒數','in-'+item.key,'例如 2',item.boxUnit);
      noteHtml = `<p class="note">${item.boxSize}g/${item.boxUnit}，換算成 ${item.bagSize}g/${item.bagUnit}</p>`;
    }
    if(item.mode==='cookYield'){
      controlHtml = inputRowHtml(`盤點${item.boxUnit}數(每${item.boxUnit}${item.boxSize}g熟重)`,'in-'+item.key,'例如 2',item.boxUnit);
      const packNote = item.rawPackSize ? `，${item.rawName}換算單位 ${item.rawPackSize}g/${item.rawPackUnit}` : '';
      noteHtml = `<p class="note">生熟轉換率 ${item.yieldRatio*100}%（1kg生料烤完約${item.yieldRatio*1000}g）${packNote}</p>`;
    }
    if(item.mode==='cookYieldWeight'){
      controlHtml = inputRowHtml('熟品盤點重量','in-'+item.key,'例如 800','g');
      const packNote = item.rawPackSize ? `，${item.rawName}換算單位 ${item.rawPackSize}g/${item.rawPackUnit}` : '';
      noteHtml = `<p class="note">生熟轉換率 ${item.yieldRatio*100}%（1kg生料處理完約${item.yieldRatio*1000}g熟重）${packNote}</p>`;
    }
    if(item.customNote) noteHtml = `<p class="note">${item.customNote}</p>`;

    card.innerHTML = `<p class="title">${item.name}</p>${controlHtml}<div id="out-${item.key}"></div>${noteHtml}`;
    app.appendChild(card);

    const inputEl = card.querySelector('#in-'+item.key);
    const outEl = card.querySelector('#out-'+item.key);

    function render(){
      const v = parseFloat(inputEl.value);
      let rows;

      if(item.mode==='weight' || item.mode==='weightBox'){
        const targetWeight = item.mode==='weightBox' ? v*item.boxSize : v;
        const kgOut = item.displayUnit==='kg';
        if(!v || v<=0){ outEl.innerHTML = rowsHtml(item.ing.map(([n,b,packSize,packUnit,groupSize,groupUnit])=>{
          const line = fmtLine(n,b,'g',packSize,packUnit,groupSize,groupUnit,kgOut);
          return [line[0], line[1]+' (基礎)'];
        })); return; }
        const scale = targetWeight/item.base;
        rows = item.ing.map(([n,b,packSize,packUnit,groupSize,groupUnit])=>fmtLine(n,b*scale,'g',packSize,packUnit,groupSize,groupUnit,kgOut));
        if(item.mode==='weightBox'){ rows.unshift(['目標總重', (kgOut?fmtKg(targetWeight):fmt(targetWeight)+' g')+'（'+fmt(v)+' '+item.boxUnit+' x '+item.boxSize+'g）']); }
      } else if(item.mode==='burrata'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['玉米糖膠(醃汁5%)','—'],['初榨橄欖油(醃汁/3)','—']]); return; }
        rows = [
          ['醃汁(玉米糖漿+蕃茄醃汁)', fmt(v)+' g'],
          ['玉米糖膠(醃汁5%)', fmt(v*0.05)+' g'],
          fmtLine('初榨橄欖油(醃汁:油=3:1)', v/3, 'g', 2760, '瓶')
        ];
      } else if(item.mode==='batch'){
        const scale = (!v || v<=0) ? 1 : v;
        rows = item.ing.map(([n,b,u,packSize,packUnit,groupSize,groupUnit])=>fmtLine(n,b*scale,u,packSize,packUnit,groupSize,groupUnit));
      } else if(item.mode==='cook'){
        const baseBoxes = item.cookedBase/item.boxSize;
        if(!v || v<=0){ outEl.innerHTML = rowsHtml(item.raw.map(([n,b,packSize,packUnit])=>{
          const line = fmtLine(n,b,'g',packSize,packUnit);
          return [line[0], line[1]+` (基礎，${item.cookedBase}g熟重/${fmt(baseBoxes)}盒)`];
        })); return; }
        const cookedTarget = v*item.boxSize;
        const scale = cookedTarget/item.cookedBase;
        rows = item.raw.map(([n,b,packSize,packUnit])=>fmtLine(n,b*scale,'g',packSize,packUnit));
        rows.unshift(['預估熟重目標', fmt(cookedTarget)+' g（'+fmt(v)+' 盒 x '+item.boxSize+'g）']);
      } else if(item.mode==='pack'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([fmtLine('需要數量', item.packSize, 'g', item.packSize, item.packUnit)]); return; }
        rows = [fmtLine('需要數量', v, 'g', item.packSize, item.packUnit)];
      } else if(item.mode==='packInv'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['總重', '—']]); return; }
        const totalG = v*item.packSize;
        const totalText = item.displayUnit==='kg' ? fmtKg(totalG) : fmt(totalG)+' g';
        rows = [['總重', totalText+'（'+fmt(v)+' '+item.packUnit+' x '+item.packSize+'g）']];
      } else if(item.mode==='packInv2'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['總重','—'],['換算包數','—']]); return; }
        const totalG = v*item.boxSize;
        rows = [
          ['總重', fmt(totalG)+' g（'+fmt(v)+' '+item.boxUnit+' x '+item.boxSize+'g）'],
          ['換算包數', fmt(totalG/item.bagSize)+' '+item.bagUnit]
        ];
      } else if(item.mode==='cookYield'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['熟重目標','—'],['需要生料重量','—']]); return; }
        const cookedTotal = v*item.boxSize;
        const rawNeeded = cookedTotal/item.yieldRatio;
        rows = [
          ['熟重目標', fmt(cookedTotal)+' g（'+fmt(v)+' '+item.boxUnit+' x '+item.boxSize+'g）'],
          ['需要'+item.rawName, fmt(rawNeeded/1000)+' kg']
        ];
        if(item.rawPackSize){
          rows.push(['換算包數', fmt(rawNeeded/item.rawPackSize)+' '+item.rawPackUnit]);
        }
      } else if(item.mode==='cookYieldWeight'){
        if(!v || v<=0){ outEl.innerHTML = rowsHtml([['需要生料重量','—'],['換算盒數','—']]); return; }
        const rawNeeded = v/item.yieldRatio;
        rows = [
          ['熟重輸入', fmt(v)+' g'],
          ['需要'+item.rawName, fmtKg(rawNeeded)]
        ];
        if(item.rawPackSize){
          rows.push(['換算'+item.rawPackUnit+'數', fmt(rawNeeded/item.rawPackSize)+' '+item.rawPackUnit]);
        }
      }
      outEl.innerHTML = rowsHtml(rows);
    }
    inputEl.addEventListener('input', render);
    render();
  });
}

showHome();
</script>
</body>
</html>
