<section id="typeChooser"><div class="top"><a class="back" href="index.html">‹ 首頁</a><h1>每日盤點</h1></div><div class="notice">每日盤點分成兩張表，請先選擇要填寫的表單。</div><div class="grid"><button class="choice" onclick="chooseType('central')"><span class="icon">🏭</span><b>央廚每日盤點表</b><small>盤點央廚貨：冷凍／冷藏、站上庫存及總計。</small></button><button class="choice" onclick="chooseType('prep')"><span class="icon">🥣</span><b>備料每日盤點表</b><small>依目前使用的四站備料品項，填寫預估、盤點與備料。</small></button></div></section>
<section id="stationChooser" class="panel"><div class="top"><button class="back" style="border:0;background:none;font-size:16px;padding:0" onclick="backToTypes()">‹ 每日盤點</button><h1 id="typeTitle"></h1></div><div class="grid"><button class="station" onclick="openStation('cold')">🥗 冷台</button><button class="station" onclick="openStation('pizza')">🍕 PIZZA</button><button class="station" onclick="openStation('s2')">🍝 S2</button><button class="station" onclick="openStation('s1')">🔥 S1</button></div><button id="summaryEntry" class="btn summary-btn" onclick="openSummary()" style="display:none">📋 查看央廚盤點總表</button></section>
<section id="formPanel" class="panel"><div class="top"><button class="back" style="border:0;background:none;font-size:16px;padding:0" onclick="backToStations()">‹ 工作站</button><h1 id="title"></h1></div><div class="meta"><label>盤點日期<input id="date" type="date"></label><label>盤點人員<input id="person" placeholder="輸入姓名"></label></div><div id="hint" class="notice"></div><div id="items"></div><div class="actions"><button class="btn clear" onclick="clearToday()">清除今日</button><button class="btn save" onclick="saveAll()">儲存盤點</button></div></section><section id="summaryPanel" class="panel"><div class="top"><button class="back" style="border:0;background:none;font-size:16px;padding:0" onclick="backFromSummary()">‹ 工作站</button><h1>央廚盤點總表</h1></div><div class="meta"><label>盤點日期<input id="summaryDate" type="date"></label><label>用途<input value="主管叫貨系統輸入" readonly></label></div><div class="notice">順序固定為：冷台 → PIZZA → S2 → S1。總表只彙整各站已輸入的「今日總計」。</div><div id="summaryContent"></div><div class="summary-actions"><button class="btn clear" onclick="copySummary()">📋 複製文字總表</button><button class="btn save" onclick="copyOrderNumbers()">📤 複製叫貨表數字</button><button class="btn clear" onclick="window.print()">🖨️ 列印</button></div>
<div class="export-card"><h2>📥 自動填入 6601 叫貨表</h2><p>上傳原本的 Excel，系統會依「現場次序 1～103」找到品項，並把本日盤點寫入所選日期的「盤點庫存」欄。原始檔不會被覆蓋，會下載一份新檔。</p><div class="export-grid"><label>叫貨表 Excel<input id="orderFile" type="file" accept=".xlsx,.xls"></label><label>工作表<select id="orderSheet" disabled><option>請先上傳 Excel</option></select></label></div><div id="exportStatus" class="export-status">尚未選擇叫貨表。</div><div class="export-actions"><button class="btn clear" onclick="previewOrderExport()">🔎 驗證位置</button><button class="btn save" onclick="exportOrderWorkbook()">⬇️ 下載已填叫貨表</button></div></div></section>
</main>

function itemKey(s){
  const n=normItem(s);
  const aliases=[
    [/乾醃熟燻畢可培根/, '乾醃熟燻畢可培根'],
    [/修清肋眼/, '修清肋眼'],
  ];
  for(const [pattern,key] of aliases)if(pattern.test(n))return key;
  return n;
}
const toDateKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const shiftDate=(key,days)=>{const [y,m,d]=key.split('-').map(Number),x=new Date(y,m-1,d);x.setDate(x.getDate()+days);return toDateKey(x)};
const shortDate=key=>{const [y,m,d]=key.split('-').map(Number);return `${m}/${d}`};
function resetDeliveries(){Object.values(centralData).flat().forEach(r=>r[4]=0)}
function applyDelivery(x){if(!x?.values)return;importedCentral=x;localStorage.setItem('kos-import-central-current',JSON.stringify(x));const m=new Map(Object.entries(x.values).map(([k,v])=>[itemKey(k),Number(v)]));Object.values(centralData).flat().forEach(r=>{const v=m.get(itemKey(r[0]));if(Number.isFinite(v))r[4]=v})}
let deliveryLabel='',previousLabel='';
async function loadDelivery(d){resetDeliveries();let data=null;try{const snap=await db.collection('deliveries').doc(d).get();if(snap.exists)data=snap.data()}catch(e){console.warn(e)}if(!data&&importedCentral?.deliveryDate===d)data=importedCentral;if(data)applyDelivery(data);deliveryLabel=shortDate(d)}

async function copyOrderNumbers(){const d=$('summaryDate').value,order=['cold','pizza','s2','s1'];let nums=[],problems=[];for(const s of order){let saved=null;try{const snap=await db.collection('dailyInventory').doc(`central-${s}-${d}`).get();if(snap.exists)saved=snap.data()}catch(e){saved=JSON.parse(localStorage.getItem(stationKey(s,d))||'null')}centralData[s].forEach((r,i)=>{const row=saved?.rows?.[i],a=parseFloat(row?.a),b=parseFloat(row?.b);if(!Number.isFinite(a)&&!Number.isFinite(b)){problems.push(`${names[s]}｜${r[0]} 未盤點`);nums.push('');return}const total=(Number.isFinite(a)?a:0)+(Number.isFinite(b)?b:0),used=r[3]===null?null:r[3]+r[4]-total;if(used!==null&&used<0)problems.push(`${names[s]}｜${r[0]} 庫存高於應有`);nums.push(fmt(total))})}if(problems.length){const msg=`發現 ${problems.length} 筆需確認：\n`+problems.slice(0,10).join('\n')+(problems.length>10?'\n…':'');if(!confirm(msg+'\n\n仍要複製待確認數字嗎？'))return}navigator.clipboard.writeText(nums.join('\n')).then(()=>alert(`已複製 ${nums.length} 格數字，可直接貼到叫貨表同一欄`)).catch(()=>alert('複製失敗'))}

function excelDateKey(v){if(v instanceof Date&&!isNaN(v))return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);if(d)return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`}const t=String(v??'').trim();const m=t.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);return m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:''}
function sheetContainsDate(ws,date){if(!ws)return false;for(let c=0;c<80;c++){const cell=ws[XLSX.utils.encode_cell({r:1,c})];if(cell&&excelDateKey(cell.v)===date)return true}return false}
function findInventoryColumn(ws,date){for(let c=0;c<100;c++){const h=ws[XLSX.utils.encode_cell({r:2,c})]?.v;if(String(h??'').replace(/\s/g,'').includes('盤點庫存')){for(let x=Math.max(0,c-3);x<=c;x++){const v=ws[XLSX.utils.encode_cell({r:1,c:x})]?.v;if(excelDateKey(v)===date)return c}}}return -1}
function collectSummaryValues(){const d=$('summaryDate').value,order=['cold','pizza','s2','s1'];return Promise.all(order.map(async s=>{let saved=null;try{const snap=await db.collection('dailyInventory').doc(`central-${s}-${d}`).get();if(snap.exists)saved=snap.data()}catch(e){saved=JSON.parse(localStorage.getItem(stationKey(s,d))||'null')}return centralData[s].map((r,i)=>{const row=saved?.rows?.[i],a=parseFloat(row?.a),b=parseFloat(row?.b);return {no:r[5],name:r[0],value:(Number.isFinite(a)||Number.isFinite(b))?(Number.isFinite(a)?a:0)+(Number.isFinite(b)?b:0):null,station:names[s]}})})).then(x=>x.flat())}
async function buildExportPlan(){if(!orderWorkbook)throw new Error('請先上傳叫貨表 Excel');const sheetName=decodeURIComponent($('orderSheet').value),ws=orderWorkbook.Sheets[sheetName],date=$('summaryDate').value,col=findInventoryColumn(ws,date);if(col<0)throw new Error(`在「${sheetName}」找不到 ${date} 對應的盤點庫存欄`);const values=await collectSummaryValues(),byNo=new Map(values.map(x=>[Number(x.no),x])),matches=[],missingRows=[],unfilled=[];const range=XLSX.utils.decode_range(ws['!ref']||'A1:A1');for(let r=3;r<=range.e.r;r++){const no=Number(ws[XLSX.utils.encode_cell({r,c:0})]?.v);if(!Number.isFinite(no)||!byNo.has(no))continue;const item=byNo.get(no);matches.push({row:r,col,item});if(item.value===null)unfilled.push(`${item.station}｜${item.no}. ${item.name}`)}for(const item of values)if(!matches.some(m=>m.item.no===item.no))missingRows.push(`${item.no}. ${item.name}`);return {sheetName,ws,date,col,matches,missingRows,unfilled}}
async function previewOrderExport(){if(!orderWorkbook)return;try{const p=await buildExportPlan(),letter=XLSX.utils.encode_col(p.col);$('exportStatus').className='export-status '+(p.unfilled.length||p.missingRows.length?'bad':'ok');$('exportStatus').innerHTML=`工作表：<b>${p.sheetName}</b><br>日期：<b>${p.date}</b>｜寫入欄：<b>${letter}（盤點庫存）</b><br>找到 ${p.matches.length}／103 項；尚未盤點 ${p.unfilled.length} 項；Excel 找不到 ${p.missingRows.length} 項。` }catch(e){$('exportStatus').className='export-status bad';$('exportStatus').textContent=e.message}}
async function exportOrderWorkbook(){try{const p=await buildExportPlan();if(p.unfilled.length){const msg=`仍有 ${p.unfilled.length} 項尚未盤點：\n${p.unfilled.slice(0,8).join('\n')}${p.unfilled.length>8?'\n…':''}\n\n尚未盤點的格子會保持空白，仍要下載嗎？`;if(!confirm(msg))return}if(p.missingRows.length&&!confirm(`Excel 中有 ${p.missingRows.length} 個品項找不到對應列，仍要下載嗎？`))return;for(const m of p.matches){const addr=XLSX.utils.encode_cell({r:m.row,c:p.col});if(m.item.value===null){delete p.ws[addr]}else{const old=p.ws[addr]||{};p.ws[addr]={...old,t:'n',v:Number(m.item.value)};delete p.ws[addr].f;delete p.ws[addr].w}}const base=orderFilename.replace(/\.(xlsx|xls)$/i,''),stamp=p.date.replace(/-/g,'');XLSX.writeFile(orderWorkbook,`${base}-${stamp}盤點已填.xlsx`,{bookType:'xlsx',cellStyles:true});$('exportStatus').className='export-status ok';$('exportStatus').textContent=`已產生 ${p.sheetName}｜${p.date} 的叫貨表。請先打開確認公式與格式。`}catch(e){console.error(e);alert(e.message||'匯出失敗')}}

$('summaryDate').addEventListener('change',()=>{renderSummary();previewOrderExport()})
function key(){return `kos-daily-v06-${formType}-${station}-${$('date').value}`}
function render(){const data=formType==='central'?centralData[station]:prepData[station];$('items').innerHTML=data.map((r,i)=>formType==='central'?centralCard(r,i):prepCard(r,i)).join('')}
function isRibeyePackItem(r){return station==='s1'&&/肋眼/.test(r[0])&&/公斤|kg/i.test(r[0])}
function centralCard(r,i){const [name,unit,storage,yesterday,delivery,no]=r,missing=yesterday===null,packMode=isRibeyePackItem(r),expected=missing?'—':fmt(yesterday+delivery);if(packMode)return `<article class="item ${missing?'warn':''}" data-i="${i}" data-pack="0.47"><h3>${no}. ${name}</h3><div class="sub">儲位：${storage}　盤點方式：包數｜每包 0.47 KG</div><div class="source-row"><div class="source-box">${previousLabel} 昨日盤點<b class="${missing?'missing':''}">${missing?'未提供':fmt(yesterday)} KG</b></div><div class="source-box">${deliveryLabel} 今日到貨<b>${fmt(delivery)} KG</b></div><div class="source-box">盤點前應有<b>${expected}${expected==='—'?'':' KG'}</b></div></div><div class="validation-grid"><div class="field"><label>今日儲位（包）<input inputmode="numeric" class="a pack-a" type="number" min="0" step="1" oninput="calcCentral(${i})"></label></div><div class="field"><label>今日站上（包）<input inputmode="numeric" class="b pack-b" type="number" min="0" step="1" oninput="calcCentral(${i})"></label></div><div class="field"><label>今日總計（KG）<input class="sum" readonly tabindex="-1"></label></div></div><div class="conversion-note">輸入包數後，系統自動以「包數 × 0.47 KG」換算；主管總表及叫貨表會帶入 KG。</div><div class="usage"><span class="used">推算使用量：—</span><span class="status">${missing?'⚠ 昨日數據缺漏':'待輸入'}</span></div></article>`;return `<article class="item ${missing?'warn':''}" data-i="${i}"><h3>${no}. ${name}</h3><div class="sub">儲位：${storage}　單位：${unit}</div><div class="source-row"><div class="source-box">${previousLabel} 昨日盤點<b class="${missing?'missing':''}">${missing?'未提供':fmt(yesterday)}</b></div><div class="source-box">${deliveryLabel} 今日到貨<b>${fmt(delivery)}</b></div><div class="source-box">盤點前應有<b>${expected}</b></div></div><div class="validation-grid"><div class="field"><label>今日儲位<input inputmode="decimal" class="a" type="number" step="0.01" oninput="calcCentral(${i})"></label></div><div class="field"><label>今日站上<input inputmode="decimal" class="b" type="number" step="0.01" oninput="calcCentral(${i})"></label></div><div class="field"><label>今日總計<input class="sum" readonly tabindex="-1"></label></div></div><div class="usage"><span class="used">推算使用量：—</span><span class="status">${missing?'⚠ 昨日數據缺漏':'待輸入'}</span></div></article>`}
function prepCard(r,i){return `<article class="item" data-i="${i}"><h3>${r[0]}</h3><div class="sub">單位：${r[1]||'—'}　效期：${r[2]||'—'}</div><div class="cols"><div class="field"><label>預估<input inputmode="decimal" class="forecast" type="number" step="0.1" oninput="calcPrep(${i})"></label></div><div class="field"><label>盤點<input inputmode="decimal" class="actual" type="number" step="0.1" oninput="calcPrep(${i})"></label></div><div class="field"><label>備料<input inputmode="decimal" class="make" type="number" step="0.1" oninput="calcPrep(${i})"></label></div></div><div class="total"><span class="shortage">差額：—</span><span class="status">待輸入</span></div></article>`}
function n(el){const v=parseFloat(el.value);return Number.isFinite(v)?v:0}
function fmt(v){return Number.isFinite(v)?Number(v.toFixed(2)).toString():'—'}
function calcCentral(i){const c=document.querySelector(`[data-i="${i}"]`),r=centralData[station][i],packWeight=Number(c.dataset.pack||0),av=c.querySelector('.a').value,bv=c.querySelector('.b').value;let a=n(c.querySelector('.a')),b=n(c.querySelector('.b'));if(packWeight){a=Math.round(a*packWeight*100)/100;b=Math.round(b*packWeight*100)/100}const total=Math.round((a+b)*100)/100;c.querySelector('.sum').value=(av===''&&bv==='')?'':fmt(total);const yesterday=r[3],delivery=r[4];if(av===''&&bv===''){c.querySelector('.used').textContent='推算使用量：—';c.querySelector('.status').textContent=yesterday===null?'⚠ 昨日數據缺漏':'待輸入';c.classList.toggle('warn',yesterday===null);return}if(yesterday===null){c.querySelector('.used').textContent='推算使用量：無法計算';c.querySelector('.status').textContent='⚠ 昨日數據缺漏';c.classList.add('warn');return}const used=yesterday+delivery-total;c.querySelector('.used').textContent=`推算使用量：${fmt(used)} ${r[1]}`;const abnormal=used<0;c.classList.toggle('warn',abnormal);c.querySelector('.status').textContent=abnormal?'⚠ 庫存高於應有':'✓ 已驗證'}
function calcPrep(i){const c=document.querySelector(`[data-i="${i}"]`),fv=c.querySelector('.forecast').value,av=c.querySelector('.actual').value,mv=c.querySelector('.make').value;if(fv===''||av===''){c.classList.remove('bad');c.querySelector('.shortage').textContent='差額：—';c.querySelector('.status').textContent='待輸入';return}const gap=n(c.querySelector('.forecast'))-n(c.querySelector('.actual')),bad=gap>0&&mv==='' ;c.classList.toggle('bad',bad);c.querySelector('.shortage').textContent=`差額：${gap.toFixed(1).replace(/\.0$/,'')}`;c.querySelector('.status').textContent=bad?'🔴 尚未填備料':'已填寫'}
async function saveAll(){const rows=[...document.querySelectorAll('.item')].map(c=>{if(formType!=='central')return {forecast:c.querySelector('.forecast').value,actual:c.querySelector('.actual').value,make:c.querySelector('.make').value};const packWeight=Number(c.dataset.pack||0),rawA=c.querySelector('.a').value,rawB=c.querySelector('.b').value;if(!packWeight)return {a:rawA,b:rawB};const a=rawA===''?'':Math.round(Number(rawA)*packWeight*100)/100,b=rawB===''?'':Math.round(Number(rawB)*packWeight*100)/100;return {a,b,aPacks:rawA,bPacks:rawB,packWeight}});const payload={person:$('person').value,rows,date:$('date').value,station,formType,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};localStorage.setItem(key(),JSON.stringify(payload));try{await db.collection('dailyInventory').doc(`${formType}-${station}-${$('date').value}`).set(payload,{merge:true});alert(formType==='central'?'已同步至雲端，可回到工作站查看央廚盤點總表':'已同步至雲端')}catch(e){console.error(e);alert('雲端同步失敗，已先保存在這支裝置。請確認網路或 Firebase 規則。')}}
async function load(){let x=JSON.parse(localStorage.getItem(key())||'null');try{const snap=await db.collection('dailyInventory').doc(`${formType}-${station}-${$('date').value}`).get();if(snap.exists){x=snap.data();localStorage.setItem(key(),JSON.stringify(x))}}catch(e){console.warn('使用本機快取',e)}$('person').value=x?.person||'';if(!x)return;[...document.querySelectorAll('.item')].forEach((c,i)=>{const r=x.rows?.[i]||{};if(formType==='central'){const packWeight=Number(c.dataset.pack||0);if(packWeight){c.querySelector('.a').value=r.aPacks??(r.a!==''&&r.a!=null?fmt(Number(r.a)/packWeight):'');c.querySelector('.b').value=r.bPacks??(r.b!==''&&r.b!=null?fmt(Number(r.b)/packWeight):'')}else{c.querySelector('.a').value=r.a??'';c.querySelector('.b').value=r.b??''}calcCentral(i)}else{c.querySelector('.forecast').value=r.forecast??'';c.querySelector('.actual').value=r.actual??'';c.querySelector('.make').value=r.make??'';calcPrep(i)}})}
async function clearToday(){if(!confirm('確定清除這一天的盤點資料？所有裝置都會一起清除。'))return;localStorage.removeItem(key());try{await db.collection('dailyInventory').doc(`${formType}-${station}-${$('date').value}`).delete()}catch(e){console.error(e);alert('雲端清除失敗，請稍後再試');return}$('person').value='';render();alert('已清除雲端盤點資料')}
$('date').addEventListener('change',async()=>{if(station){await loadDailyContext($('date').value);$('hint').textContent=formType==='central'?`已帶入 ${previousLabel} 昨日盤點與 ${deliveryLabel} 今日到貨。若昨日無資料，系統不會改抓更早日期。`:'品項依目前備料盤點表建立；請填寫預估、實際盤點與備料數量。';render();load()}});
</script></body></html>
