<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>每日盤點</title><style>
*{box-sizing:border-box}body{margin:0;background:#f3f4f1;color:#17211d;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}.wrap{max-width:760px;margin:auto;padding:16px}.top{display:flex;align-items:center;gap:12px;margin-bottom:16px}.back{color:#285842;text-decoration:none;font-weight:700}.top h1{margin:0;font-size:22px}.station-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.station{border:1px solid #dce2dd;background:white;border-radius:16px;padding:22px 10px;font-size:18px;font-weight:800;cursor:pointer}.panel{display:none}.panel.active{display:block}.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#fff;padding:14px;border-radius:15px;border:1px solid #dfe4df;margin-bottom:12px}.meta label{font-size:12px;color:#69736e}.meta input,.meta select{width:100%;margin-top:5px;height:40px;border:1px solid #cad2cd;border-radius:9px;padding:0 10px;font-size:16px}.item{background:#fff;border:1px solid #dfe4df;border-radius:16px;padding:15px;margin-bottom:10px}.item.bad{border:2px solid #d84242;background:#fff8f8}.item h3{margin:0 0 12px;font-size:17px}.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.field label{font-size:11px;color:#6a746f}.field input{width:100%;height:42px;margin-top:4px;border:1px solid #cbd2ce;border-radius:9px;padding:0 8px;font-size:17px}.result{display:flex;justify-content:space-between;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #edf0ee;font-size:13px}.status{font-weight:800}.bad .status{color:#c32929}.actions{position:sticky;bottom:0;background:linear-gradient(transparent,#f3f4f1 20%);padding:24px 0 8px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:12px;height:48px;font-size:16px;font-weight:800}.save{background:#173b2f;color:#fff}.clear{background:#e4e8e5;color:#37423c}.notice{background:#fff8df;border:1px solid #ead18b;padding:11px 13px;border-radius:12px;font-size:12px;line-height:1.55;margin-bottom:12px}.empty{background:#fff;border:1px dashed #bbc5bf;border-radius:15px;padding:28px;text-align:center;color:#69736e}@media(max-width:520px){.cols{grid-template-columns:1fr 1fr 1fr}.meta{grid-template-columns:1fr}.field input{font-size:16px}}
</style></head><body><main class="wrap"><div id="chooser"><div class="top"><a class="back" href="index.html">‹ 首頁</a><h1>每日盤點</h1></div><div class="notice">先選擇自己的工作站。每日盤點資料會儲存在目前這台裝置的瀏覽器內。</div><div class="station-grid"><button class="station" onclick="openStation('cold')">🥗 冷台</button><button class="station" onclick="openStation('pizza')">🍕 PIZZA</button><button class="station" onclick="openStation('s1')">🔥 S1</button><button class="station" onclick="openStation('s2')">🍝 S2</button></div></div><section id="panel" class="panel"><div class="top"><button class="back" style="border:0;background:none;font-size:16px;padding:0" onclick="goBack()">‹ 工作站</button><h1 id="title"></h1></div><div class="meta"><label>盤點日期<input id="date" type="date"></label><label>盤點人員<input id="person" placeholder="輸入姓名"></label></div><div class="notice">計算：昨日庫存＋今日到貨－今日盤點＝推算使用量。當使用量超過可用庫存的 60%，顯示紅色異常。</div><div id="items"></div><div class="actions"><button class="btn clear" onclick="clearToday()">清除今日</button><button class="btn save" onclick="saveAll()">儲存盤點</button></div></section></main><script>
const stationData={
 cold:{name:'冷台',items:['混合生菜','小黃瓜片','紫洋蔥絲','紅藜麥','洋薏仁','醃番茄','布拉塔蕃茄汁','松露醬','切達丁','玉米沙拉','花生碎','熟白芝麻','章魚','章魚沙拉','綠胡椒臘腸','檸檬油醋','薄荷醬','醃漬小黃瓜丁','醃漬杏桃丁']},
 pizza:{name:'PIZZA',items:['馬茲瑞拉起司','Pizza醬','乾蔥圈','佛特樂乾酪','烤義式絞肉','烤香菇片','烤馬鈴薯片','畢可培根','Ricotta','溫泉蛋','農夫派底醬','香菇派底醬']},
 s1:{name:'S1',items:['生混菇','炒香菇','蝦夷蔥','菇汁','分雞腿','分牛肋','漢堡菜','馬鈴薯','牛小排','蛋刷醬','牛汁','茄子']},
 s2:{name:'S2',items:['Bolo醬','墨魚醬','醃番茄汁','白酒','義大利麵','燉飯米','章魚','海鮮料']}
};
let station='';const $=id=>document.getElementById(id);$('date').value=new Date().toISOString().slice(0,10);
function key(){return `kos-daily-${station}-${$('date').value}`}
function openStation(s){station=s;$('chooser').style.display='none';$('panel').classList.add('active');$('title').textContent=stationData[s].name+' 每日盤點';render();load()}
function goBack(){$('panel').classList.remove('active');$('chooser').style.display='block';station=''}
function render(){$('items').innerHTML=stationData[station].items.map((n,i)=>`<article class="item" data-i="${i}"><h3>${n}</h3><div class="cols"><div class="field"><label>昨日庫存<input inputmode="decimal" class="prev" type="number" step="0.1" oninput="calc(${i})"></label></div><div class="field"><label>今日到貨<input inputmode="decimal" class="in" type="number" step="0.1" oninput="calc(${i})"></label></div><div class="field"><label>今日盤點<input inputmode="decimal" class="actual" type="number" step="0.1" oninput="calc(${i})"></label></div></div><div class="result"><span class="usage">推算使用量：—</span><span class="status">待輸入</span></div></article>`).join('')}
function num(el){const v=parseFloat(el.value);return Number.isFinite(v)?v:0}
function calc(i){const card=document.querySelector(`[data-i="${i}"]`),p=num(card.querySelector('.prev')),d=num(card.querySelector('.in')),a=card.querySelector('.actual').value===''?null:num(card.querySelector('.actual')),available=p+d;if(a===null){card.classList.remove('bad');card.querySelector('.usage').textContent='推算使用量：—';card.querySelector('.status').textContent='待輸入';return}const use=available-a,abnormal=available>0&&use>available*.6;card.classList.toggle('bad',abnormal);card.querySelector('.usage').textContent=`推算使用量：${use.toFixed(1)}`;card.querySelector('.status').textContent=abnormal?'🔴 異常':'正常'}
function saveAll(){const rows=[...document.querySelectorAll('.item')].map(c=>({prev:c.querySelector('.prev').value,in:c.querySelector('.in').value,actual:c.querySelector('.actual').value}));localStorage.setItem(key(),JSON.stringify({person:$('person').value,rows}));alert('已儲存')}
function load(){const x=JSON.parse(localStorage.getItem(key())||'null');if(!x)return;$('person').value=x.person||'';[...document.querySelectorAll('.item')].forEach((c,i)=>{const r=x.rows?.[i]||{};c.querySelector('.prev').value=r.prev??'';c.querySelector('.in').value=r.in??'';c.querySelector('.actual').value=r.actual??'';calc(i)})}
function clearToday(){if(!confirm('確定清除這一天的盤點資料？'))return;localStorage.removeItem(key());$('person').value='';render()}
$('date').addEventListener('change',()=>{if(station){render();load()}});
</script></body></html>
