<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>每日盤點</title><style>
*{box-sizing:border-box}body{margin:0;background:#f3f4f1;color:#17211d;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}.wrap{max-width:820px;margin:auto;padding:16px}.top{display:flex;align-items:center;gap:12px;margin-bottom:16px}.back{color:#285842;text-decoration:none;font-weight:800}.top h1{margin:0;font-size:22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.choice{border:1px solid #dce2dd;background:white;border-radius:18px;padding:22px 14px;text-align:left;cursor:pointer}.choice .icon{font-size:28px}.choice b{display:block;font-size:18px;margin:8px 0}.choice small{color:#68736d;line-height:1.5}.station{border:1px solid #dce2dd;background:white;border-radius:16px;padding:22px 10px;font-size:18px;font-weight:800;cursor:pointer}.panel{display:none}.panel.active{display:block}.notice{background:#fff8df;border:1px solid #ead18b;padding:11px 13px;border-radius:12px;font-size:12px;line-height:1.55;margin-bottom:12px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#fff;padding:14px;border-radius:15px;border:1px solid #dfe4df;margin-bottom:12px}.meta label{font-size:12px;color:#69736e}.meta input{width:100%;margin-top:5px;height:40px;border:1px solid #cad2cd;border-radius:9px;padding:0 10px;font-size:16px}.item{background:#fff;border:1px solid #dfe4df;border-radius:15px;padding:14px;margin-bottom:10px}.item.bad{border:2px solid #d84242;background:#fff8f8}.item h3{margin:0 0 3px;font-size:16px}.sub{font-size:12px;color:#77817c;margin-bottom:10px}.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.field label{font-size:11px;color:#6a746f}.field input{width:100%;height:42px;margin-top:4px;border:1px solid #cbd2ce;border-radius:9px;padding:0 8px;font-size:16px}.total{margin-top:10px;padding-top:9px;border-top:1px solid #edf0ee;display:flex;justify-content:space-between;font-size:13px}.status{font-weight:800}.bad .status{color:#c32929}.actions{position:sticky;bottom:0;background:linear </style></head><body><main class="wrap">
<section id="typeChooser"><div class="top"><a class="back" href="index.html">‹ 首頁</a><h1>每日盤點</h1></div><div class="notice">每日盤點分成兩張表，請先選擇要填寫的表單。</div><div class="grid"><button class="choice" onclick="chooseType('central')"><span class="icon">🏭</span><b>央廚每日盤點表</b><small>盤點央廚貨：冷凍／冷藏、站上庫存及總計。</small></button><button class="choice" onclick="chooseType('prep')"><span class="icon">🥣</span><b>備料每日盤點表</b><small>依目前使用的四站備料品項，填寫預估、盤點與備料。</small></button></div></section>
<section id="stationChooser" class="panel"><div class="top"><button class="back" style="border:0;background:none;font-size:16px;padding:0" onclick="backToTypes()">‹ 每日盤點</button><h1 id="typeTitle"></h1></div><div class="grid"><button class="station" onclick="openStation('cold')">🥗 冷台</button><button class="station" onclick="openStation('pizza')">🍕 PIZZA</button><button class="station" onclick="openStation('s1')">🔥 S1</button><button class="station" onclick="openStation('s2')">🍝 S2</button></div></section>
<section id="formPanel" class="panel"><div class="top"><button class="back" style="border:0;background:none;font-size:16px;padding:0" onclick="backToStations()">‹ 工作站</button><h1 id="title"></h1></div><div class="meta"><label>盤點日期<input id="date" type="date"></label><label>盤點人員<input id="person" placeholder="輸入姓名"></label></div><div id="hint" class="notice"></div><div id="items"></div><div class="actions"><button class="btn clear" onclick="clearToday()">清除今日</button><button class="btn save" onclick="saveAll()">儲存盤點</button></div></section>

50G/BAG", "包"], ["墨魚肉醬1.2KG/BAG", "包"], ["墨魚絲640G/BAG", "包"], ["燉羊肉醬1800G/BAG", "包"], ["山羊起司醬100G/BAG", "包"], ["伏特加辣番茄醬850G/BAG", "包"], ["紅蝦高湯1600G/BAG", "包"], ["巴西里青醬250G/BAG", "包"], ["帕馬森起司高湯1KG/BAG", "包"], ["牛油500G/BAG", "包"], ["帕達諾起司粉1000G/BAG", "包"], ["塔雷吉歐起司奶蓋600G/包", "包"], ["蕃茄調味汁600G/包", "包"], ["白酒甘蔥碎200G/BAG", "包"], ["醃紅辣椒片125G/BAG", "包"], ["油封蕃茄500G/BAG", "包"], ["檸檬瑞可塔起司400G/BAG", "包"], ["香蒜麵包碎200G/BAG", "包"], ["乾辣椒碎200G/BAG", "包"]]};
let formType='',station='';const $=id=>document.getElementById(id);$('date').value=new Date().toISOString().slice(0,10);
function chooseType(t){formType=t;$('typeChooser').style.display='none';$('stationChooser').classList.add('active');$('typeTitle').textContent=t==='central'?'央廚每日盤點表':'備料每日盤點表'}
function backToTypes(){$('stationChooser').classList.remove('active');$('typeChooser').style.display='block';formType=''}
function openStation(s){station=s;$('stationChooser').classList.remove('active');$('formPanel').classList.add('active');$('title').textContent=`${names[s]}｜${formType==='central'?'央廚每日盤點':'備料每日盤點'}`;$('hint').textContent=formType==='central'?'冷凍／冷藏＋站上＝總計；資料會儲存在目前裝置的瀏覽器內。':'品項依目前備料盤點表建立；請填寫預估、實際盤點與備料數量。';render();load()}
function backToStations(){$('formPanel').classList.remove('active');$('stationChooser').classList.add('active');station=''}
function key(){return `kos-daily-v05-${formType}-${station}-${$('date').value}`}
function render(){const data=formType==='central'?centralData[station]:prepData[station];$('items').innerHTML=data.map((r,i)=>formType==='central'?centralCard(r,i):prepCard(r,i)).join('')}
function centralCard(r,i){return `<article class="item" data-i="${i}"><h3>${r[0]}</h3><div class="sub">單位：${r[1]||'—'}</div><div class="cols"><div class="field"><label>冷凍／冷藏<input inputmode="decimal" class="a" type="number" step="0.1" oninput="calcCentral(${i})"></label></div><div class="field"><label>站上<input inputmode="decimal" class="b" type="number" step="0.1" oninput="calcCentral(${i})"></label></div><div class="field"><label>總計<input class="sum" readonly tabindex="-1"></label></div></div></article>`}
function prepCard(r,i){return `<article class="item" data-i="${i}"><h3>${r[0]}</h3><div class="sub">單位：${r[1]||'—'}　效期：${r[2]||'—'}</div><div class="cols"><div class="field"><label>預估<input inputmode="decimal" class="forecast" type="number" step="0.1" oninput="calcPrep(${i})"></label></div><div class="field"><label>盤點<input inputmode="decimal" class="actual" type="number" step="0.1" oninput="calcPrep(${i})"></label></div><div class="field"><label>備料<input inputmode="decimal" class="make" type="number" step="0.1" oninput="calcPrep(${i})"></label></div></div><div class="total"><span class="shortage">差額：—</span><span class="status">待輸入</span></div></article>`}
function n(el){const v=parseFloat(el.value);return Number.isFinite(v)?v:0}
function calcCentral(i){const c=document.querySelector(`[data-i="${i}"]`);c.querySelector('.sum').value=(n(c.querySelector('.a'))+n(c.querySelector('.b'))).toFixed(1).replace(/\.0$/,'')}
function calcPrep(i){const c=document.querySelector(`[data-i="${i}"]`),fv=c.querySelector('.forecast').value,av=c.querySelector('.actual').value,mv=c.querySelector('.make').value;if(fv===''||av===''){c.classList.remove('bad');c.querySelector('.shortage').textContent='差額：—';c.querySelector('.status').textContent='待輸入';return}const gap=n(c.querySelector('.forecast'))-n(c.querySelector('.actual')),bad=gap>0&&mv==='' ;c.classList.toggle('bad',bad);c.querySelector('.shortage').textContent=`差額：${gap.toFixed(1).replace(/\.0$/,'')}`;c.querySelector('.status').textContent=bad?'🔴 尚未填備料':'已填寫'}
function saveAll(){const rows=[...document.querySelectorAll('.item')].map(c=>formType==='central'?{a:c.querySelector('.a').value,b:c.querySelector('.b').value}:{forecast:c.querySelector('.forecast').value,actual:c.querySelector('.actual').value,make:c.querySelector('.make').value});localStorage.setItem(key(),JSON.stringify({person:$('person').value,rows}));alert('已儲存')}
function load(){const x=JSON.parse(localStorage.getItem(key())||'null');$('person').value=x?.person||'';if(!x)return;[...document.querySelectorAll('.item')].forEach((c,i)=>{const r=x.rows?.[i]||{};if(formType==='central'){c.querySelector('.a').value=r.a??'';c.querySelector('.b').value=r.b??'';calcCentral(i)}else{c.querySelector('.forecast').value=r.forecast??'';c.querySelector('.actual').value=r.actual??'';c.querySelector('.make').value=r.make??'';calcPrep(i)}})}
function clearToday(){if(!confirm('確定清除這一天的盤點資料？'))return;localStorage.removeItem(key());$('person').value='';render()}
$('date').addEventListener('change',()=>{if(station){render();load()}});
</script></body></html>
